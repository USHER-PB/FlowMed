services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://healthuser:healthpass@db:3306/healthapp
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=nlM32kTpujzoF4QIV6Dzpgj2DXQ0QKE0DvyO7aSDttOwrXmj8egJYad0xuo2ZcGRPubXVaARrvoe+Xpj75sNTA==
      - JWT_EXPIRES_IN=7d
      - ENCRYPTION_KEY=+MpkGVbEH1M6oHgIVnIndNQ7Fr0x/BDEUASiH9quao8=
      - NEXTAUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: healthapp
      MYSQL_USER: healthuser
      MYSQL_PASSWORD: healthpass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "healthuser", "-phealthpass"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

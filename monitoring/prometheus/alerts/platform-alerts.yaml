# =============================================================================
# Platform Alerting Rules
# =============================================================================
# Alert rules for platform-wide monitoring.
# =============================================================================

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-alerting-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: om-platform
    prometheus: platform
spec:
  groups:
    # ==========================================================================
    # Application Alerts
    # ==========================================================================
    - name: application.alerts
      rules:
        - alert: HighErrorRate
          expr: |
            (
              sum by (namespace, app) (rate(http_requests_total{status=~"5.."}[5m]))
              /
              sum by (namespace, app) (rate(http_requests_total[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate for {{ $labels.app }}"
            description: "Application {{ $labels.app }} in namespace {{ $labels.namespace }} has error rate of {{ $value | humanizePercentage }}"

        - alert: CriticalErrorRate
          expr: |
            (
              sum by (namespace, app) (rate(http_requests_total{status=~"5.."}[5m]))
              /
              sum by (namespace, app) (rate(http_requests_total[5m]))
            ) > 0.1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Critical error rate for {{ $labels.app }}"
            description: "Application {{ $labels.app }} in namespace {{ $labels.namespace }} has error rate of {{ $value | humanizePercentage }}"

        - alert: HighLatency
          expr: |
            application:http_request_duration_seconds:p95 > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High latency for {{ $labels.app }}"
            description: "Application {{ $labels.app }} p95 latency is {{ $value | humanizeDuration }}"

        - alert: ServiceDown
          expr: |
            up{job=~".*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.job }} is down"
            description: "Service {{ $labels.job }} in namespace {{ $labels.namespace }} has been down for more than 2 minutes"

    # ==========================================================================
    # Resource Alerts
    # ==========================================================================
    - name: resource.alerts
      rules:
        - alert: PodHighCPU
          expr: |
            (
              sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{container!=""}[5m]))
              /
              sum by (namespace, pod) (kube_pod_container_resource_limits{resource="cpu"})
            ) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} high CPU usage"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is using {{ $value | humanizePercentage }} of CPU limit"

        - alert: PodHighMemory
          expr: |
            (
              sum by (namespace, pod) (container_memory_working_set_bytes{container!=""})
              /
              sum by (namespace, pod) (kube_pod_container_resource_limits{resource="memory"})
            ) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} high memory usage"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is using {{ $value | humanizePercentage }} of memory limit"

        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} was OOMKilled"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was terminated due to OOM"

        - alert: PVCAlmostFull
          expr: |
            (
              kubelet_volume_stats_used_bytes
              /
              kubelet_volume_stats_capacity_bytes
            ) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} almost full"
            description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value | humanizePercentage }} full"

    # ==========================================================================
    # Kubernetes Alerts
    # ==========================================================================
    - name: kubernetes.alerts
      rules:
        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas != kube_deployment_status_replicas_available
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} replicas mismatch"
            description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has {{ $value }} unavailable replicas"

        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total[1h]) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in the last hour"

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{condition="false"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for more than 15 minutes"

        - alert: NodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not ready"
            description: "Node {{ $labels.node }} has been not ready for more than 5 minutes"

        - alert: NodeHighMemoryPressure
          expr: |
            kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} has memory pressure"
            description: "Node {{ $labels.node }} is experiencing memory pressure"

        - alert: NodeHighDiskPressure
          expr: |
            kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} has disk pressure"
            description: "Node {{ $labels.node }} is experiencing disk pressure"

    # ==========================================================================
    # SLO Alerts
    # ==========================================================================
    - name: slo.alerts
      rules:
        - alert: SLOAvailabilityBreach
          expr: |
            sli:availability:ratio5m < 0.99
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "SLO availability breach for {{ $labels.app }}"
            description: "Application {{ $labels.app }} availability is {{ $value | humanizePercentage }}, below 99% SLO"

        - alert: SLOLatencyBreach
          expr: |
            sli:latency:ratio5m < 0.95
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "SLO latency breach for {{ $labels.app }}"
            description: "Application {{ $labels.app }} latency SLI is {{ $value | humanizePercentage }}, below 95% SLO"

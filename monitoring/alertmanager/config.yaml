# =============================================================================
# Alertmanager Configuration Template
# =============================================================================
# This is a template configuration. Update with your actual notification
# endpoints before deploying to production.
# =============================================================================

global:
  resolve_timeout: 5m
  # SMTP settings for email notifications
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@example.com'
  # smtp_auth_username: 'alertmanager'
  # smtp_auth_password: '<secret>'

  # Slack settings
  # slack_api_url: 'https://hooks.slack.com/services/xxx/yyy/zzz'

# Inhibition rules - suppress notifications in certain conditions
inhibit_rules:
  # If critical alert fires, suppress warning alerts for same alertname
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname", "namespace"]

  # If a node is down, suppress pod-level alerts on that node
  - source_matchers:
      - alertname = "NodeNotReady"
    target_matchers:
      - severity =~ "warning|critical"
    equal: ["node"]

# Route tree for alert routing
route:
  # Default receiver
  receiver: "default-receiver"

  # Group alerts by these labels
  group_by: ["alertname", "namespace", "severity"]

  # Wait before sending first notification for a new group
  group_wait: 30s

  # Wait before sending notifications for new alerts in a group
  group_interval: 5m

  # Wait before re-sending a notification
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts go to pagerduty/opsgenie
    - matchers:
        - severity = "critical"
      receiver: "critical-receiver"
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts go to Slack
    - matchers:
        - severity = "warning"
      receiver: "warning-receiver"
      repeat_interval: 4h

    # Silence watchdog and info alerts
    - matchers:
        - alertname =~ "InfoInhibitor|Watchdog"
      receiver: "null"

    # Team-specific routing (example)
    - matchers:
        - team = "backend"
      receiver: "team-backend"
      routes:
        - matchers:
            - severity = "critical"
          receiver: "team-backend-critical"

    - matchers:
        - team = "frontend"
      receiver: "team-frontend"

# Receivers define notification targets
receivers:
  # Null receiver - alerts are silenced
  - name: "null"

  # Default receiver

---
# Keycloak database credentials for CloudNativePG managed role
# This secret is used by CNPG to create the keycloak PostgreSQL user
#
# To create this secret:
# 1. Create a local secret first:
#    kubectl create secret generic keycloak-db-credentials \
#      --namespace=fineract \
#      --type=kubernetes.io/basic-auth \
#      --from-literal=username=keycloak \
#      --from-literal=password=<your-secure-password> \
#      --dry-run=client -o yaml > keycloak-db-credentials.yaml
#
# 2. Seal it with kubeseal:
#    kubeseal --format yaml < keycloak-db-credentials.yaml > keycloak-db-credentials-sealed.yaml
#
# 3. Apply the sealed secret:
#    kubectl apply -f keycloak-db-credentials-sealed.yaml
#
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: keycloak-db-credentials
  namespace: fineract
spec:
  encryptedData:
    # Replace these with your encrypted values from kubeseal
    username: AgPlaceholderReplaceWithEncryptedValue
    password: AgPlaceholderReplaceWithEncryptedValue
  template:
    metadata:
      name: keycloak-db-credentials
      namespace: fineract
    type: kubernetes.io/basic-auth

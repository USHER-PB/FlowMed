# Sealed Secrets Templates for Fineract App Services
# These are templates to generate sealed secrets using kubeseal
#
# Usage:
#   1. Fill in the placeholder values
#   2. Generate sealed secret:
#      kubectl create secret generic payment-gateway-secrets \
#        --from-literal=database-password=<password> \
#        --from-literal=keycloak-client-secret=<secret> \
#        --namespace=fineract \
#        --dry-run=client -o yaml | kubeseal -o yaml > sealed-payment-gateway.yaml
#   3. Apply the sealed secret:
#      kubectl apply -f sealed-payment-gateway.yaml

---
# Payment Gateway Secrets Template
apiVersion: v1
kind: Secret
metadata:
  name: payment-gateway-secrets
  namespace: fineract
  labels:
    app.kubernetes.io/name: payment-gateway
    app.kubernetes.io/component: payment-gateway
    app.kubernetes.io/part-of: fineract-app-services
type: Opaque
stringData:
  # Database credentials
  database-password: "CHANGE_ME_payment_gateway_db_password"

  # Keycloak OAuth2
  keycloak-client-secret: "CHANGE_ME_keycloak_client_secret"

  # Fineract API credentials
  fineract-password: "CHANGE_ME_fineract_password"

  # MTN MoMo API credentials
  mtn-collection-key: "CHANGE_ME_mtn_collection_key"
  mtn-disbursement-key: "CHANGE_ME_mtn_disbursement_key"
  mtn-api-user-id: "CHANGE_ME_mtn_api_user_id"
  mtn-api-key: "CHANGE_ME_mtn_api_key"

  # Orange Money API credentials
  orange-client-id: "CHANGE_ME_orange_client_id"
  orange-client-secret: "CHANGE_ME_orange_client_secret"
  orange-merchant-code: "CHANGE_ME_orange_merchant_code"

  # CinetPay API credentials
  cinetpay-api-key: "CHANGE_ME_cinetpay_api_key"
  cinetpay-api-password: "CHANGE_ME_cinetpay_api_password"

  # Nokash API credentials
  nokash-ispace-key: "CHANGE_ME_nokash_ispace_key"
  nokash-appspace-key: "CHANGE_ME_nokash_appspace_key"


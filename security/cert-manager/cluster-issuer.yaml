# =============================================================================
# cert-manager Cluster Issuers
# =============================================================================
# Define certificate issuers for TLS certificate management.
# =============================================================================

# Let's Encrypt Staging (for testing)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/part-of: om-platform
spec:
  acme:
    # Staging server for testing
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: platform@example.com  # Update with your email
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      # HTTP-01 challenge solver (requires ingress)
      - http01:
          ingress:
            class: nginx
      # DNS-01 challenge solver (for wildcard certs)
      # - dns01:
      #     route53:
      #       region: us-east-1
      #       hostedZoneID: ZXXXXXXXXXXXXX

---
# Let's Encrypt Production
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/part-of: om-platform
spec:
  acme:
    # Production server
    server: https://acme-v02.api.letsencrypt.org/directory
    email: platform@example.com  # Update with your email
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# Self-Signed Issuer (for internal services)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
  labels:
    app.kubernetes.io/part-of: om-platform
spec:
  selfSigned: {}

---
# CA Issuer (for internal PKI)
# First, create a self-signed root CA
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: platform-ca
  secretName: platform-ca-key-pair
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
# CA Issuer using the root CA
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: platform-ca-issuer
  labels:
    app.kubernetes.io/part-of: om-platform
spec:
  ca:
    secretName: platform-ca-key-pair

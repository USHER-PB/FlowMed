tenant: default

systemConfig:
  currency:
    code: XAF
    name: Central African CFA Franc
    decimalPlaces: 2
  workingDays:
    recurrence: FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR
    repaymentReschedulingType: MOVE_TO_NEXT_WORKING_DAY
    extendTermForDailyRepayments: false
  globalConfig:
    - name: maker-checker
      enabled: true
    - name: enable-business-date
      enabled: true
    - name: enable-auto-generated-external-id
      enabled: true
    - name: financial-year-beginning-month
      enabled: true
      value: 1
    - name: allow-transactions-on-non-workingday
      enabled: false
    - name: allow-transactions-on-holiday
      enabled: false
  codes:
    - name: Gender
      values:
        - name: Male
          position: 1
          isActive: true
        - name: Female
          position: 2
          isActive: true
        - name: Other
          position: 3
          isActive: true
    - name: ClientType
      values:
        - name: Individual
          position: 1
          isActive: true
        - name: Corporate
          position: 2
          isActive: true
    - name: ClientClassification
      values:
        - name: Active
          position: 1
          isActive: true
  accountNumberPreferences:
    - accountType: CLIENT
      prefixType: 1
    - accountType: SAVINGS
      prefixType: 301


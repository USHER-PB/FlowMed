# =============================================================================
# Gateway Nginx - Replicates K8s Ingress with OAuth2-Proxy auth_request
# =============================================================================
# Single entry point with path-based routing
# Unauthenticated users are redirected to Keycloak via OAuth2-Proxy
# =============================================================================

# JSON structured access log format for observability
log_format json_combined escape=json '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
  '"request":"$request","status":$status,"body_bytes_sent":$body_bytes_sent,'
  '"request_time":$request_time,"upstream_response_time":"$upstream_response_time",'
  '"http_referer":"$http_referer","http_user_agent":"$http_user_agent"}';

# Use kube-dns for dynamic upstream resolution
resolver KUBE_DNS_RESOLVER valid=30s ipv6=off;

server {
    listen 80;
    server_name _;

    access_log /dev/stdout json_combined;

    # Disable absolute redirects so nginx sends relative Location headers.
    absolute_redirect off;

    # Large headers for OAuth2 cookies/tokens
    large_client_header_buffers 4 32k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;

    # =========================================================================
    # OAuth2-Proxy endpoints (public, no auth required)
    # =========================================================================
    location = /oauth2/start {
        set $upstream_oauth2 OAUTH2_PROXY_SERVICE.KUBE_NAMESPACE.svc.cluster.local;
        proxy_pass http://$upstream_oauth2:4180;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /oauth2/authorization/ {
        set $rd_path /home/;
        if ($arg_rd ~ "^http.*%2F%2F[^%]*(%2F.*)$") {
            set $rd_path $1;
        }
        if ($arg_rd ~ "^https?://[^/]+(/.*)$") {
            set $rd_path $1;
        }
        if ($arg_rd ~ "^(/.+)$") {
            set $rd_path $1;
        }
        return 302 /oauth2/start?rd=$rd_path;
    }

    location /oauth2/ {
        set $upstream_oauth2 OAUTH2_PROXY_SERVICE.KUBE_NAMESPACE.svc.cluster.local;
        proxy_pass http://$upstream_oauth2:4180;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        set $redirect_target $arg_rd;
        if ($redirect_target = "") {
            set $redirect_target /home/;
        }
        proxy_set_header X-Auth-Request-Redirect $redirect_target;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Internal auth check endpoint
    location = /oauth2/auth {
        internal;
        set $upstream_oauth2_auth OAUTH2_PROXY_SERVICE.KUBE_NAMESPACE.svc.cluster.local;
        proxy_pass http://$upstream_oauth2_auth:4180/oauth2/auth;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Error handler: redirect to Keycloak login via OAuth2-Proxy on 401
    error_page 401 = @error401;
    location @error401 {
        return 302 /oauth2/start?rd=$request_uri;
    }

    # =========================================================================
    # Static assets - bypass auth (same pattern as K8s ingress)
    # =========================================================================
    location ~* ^/(home|cashier|account|administration|branch|branchmanager|reporting|accounting|asset-manager)/(assets|dist)/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|map)$ {
        set $app_name $1;
        set $backend "";

        if ($app_name = "cashier") { set $backend "fineract-ui-stack-cashier.KUBE_NAMESPACE.svc.cluster.local"; }
        if ($app_name = "account") { set $backend "fineract-ui-stack-account-management.KUBE_NAMESPACE.svc.cluster.local"; }
        if ($app_name = "administration") { set $backend "fineract-ui-stack-admin.KUBE_NAMESPACE.svc.cluster.local"; }
        if ($app_name = "branch") { set $backend "fineract-ui-stack-branch.KUBE_NAMESPACE.svc.cluster.local"; }
        if ($app_name = "branchmanager") { set $backend "fineract-ui-stack-branch.KUBE_NAMESPACE.svc.cluster.local"; }
        if ($app_name = "reporting") { set $backend "fineract-ui-stack-reporting.KUBE_NAMESPACE.svc.cluster.local"; }
        if ($app_name = "accounting") { set $backend "fineract-ui-stack-accounting.KUBE_NAMESPACE.svc.cluster.local"; }
        if ($app_name = "home") { set $backend "fineract-ui-stack-portal.KUBE_NAMESPACE.svc.cluster.local"; }
        if ($app_name = "asset-manager") { set $backend "fineract-ui-stack-asset.KUBE_NAMESPACE.svc.cluster.local"; }

        rewrite ^/[^/]+/(.*) /$1 break;
        proxy_pass http://$backend:80;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # =========================================================================
    # Frontend Apps (OAuth2 protected)
    # =========================================================================

    # Cashier App
    location /cashier/ {
        auth_request /oauth2/auth;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;
        auth_request_set $auth_user_cashier $upstream_http_x_auth_request_user;
        auth_request_set $auth_email_cashier $upstream_http_x_auth_request_email;
        auth_request_set $auth_groups_cashier $upstream_http_x_auth_request_groups;
        include /etc/nginx/includes/oauth2-auth-cookie.conf;

        set $upstream_cashier fineract-ui-stack-cashier.KUBE_NAMESPACE.svc.cluster.local;
        rewrite ^/cashier/(.*) /$1 break;
        proxy_pass http://$upstream_cashier:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $access_token";
        proxy_set_header X-Auth-Request-User $auth_user_cashier;
        proxy_set_header X-Auth-Request-Email $auth_email_cashier;
        proxy_set_header X-Auth-Request-Groups $auth_groups_cashier;

        proxy_set_header Accept-Encoding "";
        sub_filter '<head>' '<head><base href="/cashier/">';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # Accounting App
    location /accounting/ {
        auth_request /oauth2/auth;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;
        auth_request_set $auth_user_accounting $upstream_http_x_auth_request_user;
        auth_request_set $auth_email_accounting $upstream_http_x_auth_request_email;
        auth_request_set $auth_groups_accounting $upstream_http_x_auth_request_groups;
        include /etc/nginx/includes/oauth2-auth-cookie.conf;

        set $upstream_accounting fineract-ui-stack-accounting.KUBE_NAMESPACE.svc.cluster.local;
        rewrite ^/accounting/(.*) /$1 break;
        proxy_pass http://$upstream_accounting:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $access_token";
        proxy_set_header X-Auth-Request-User $auth_user_accounting;
        proxy_set_header X-Auth-Request-Email $auth_email_accounting;
        proxy_set_header X-Auth-Request-Groups $auth_groups_accounting;

        proxy_set_header Accept-Encoding "";
        sub_filter '<head>' '<head><base href="/accounting/">';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # Reporting App
    location /reporting/ {
        auth_request /oauth2/auth;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;
        include /etc/nginx/includes/oauth2-auth-cookie.conf;

        set $upstream_reporting fineract-ui-stack-reporting.KUBE_NAMESPACE.svc.cluster.local;
        rewrite ^/reporting/(.*) /$1 break;
        proxy_pass http://$upstream_reporting:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $access_token";

        proxy_set_header Accept-Encoding "";
        sub_filter '<head>' '<head><base href="/reporting/">';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # Admin App
    location /administration/ {
        auth_request /oauth2/auth;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;
        auth_request_set $auth_user_admin $upstream_http_x_auth_request_user;
        auth_request_set $auth_email_admin $upstream_http_x_auth_request_email;
        auth_request_set $auth_groups_admin $upstream_http_x_auth_request_groups;
        include /etc/nginx/includes/oauth2-auth-cookie.conf;

        set $upstream_admin fineract-ui-stack-admin.KUBE_NAMESPACE.svc.cluster.local;
        rewrite ^/administration/(.*) /$1 break;
        proxy_pass http://$upstream_admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $access_token";
        proxy_set_header X-Auth-Request-User $auth_user_admin;
        proxy_set_header X-Auth-Request-Email $auth_email_admin;
        proxy_set_header X-Auth-Request-Groups $auth_groups_admin;

        proxy_set_header Accept-Encoding "";
        sub_filter '<head>' '<head><base href="/administration/">';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # Account Manager App
    location /account/ {
        auth_request /oauth2/auth;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;
        include /etc/nginx/includes/oauth2-auth-cookie.conf;

        set $upstream_account fineract-ui-stack-account-management.KUBE_NAMESPACE.svc.cluster.local;
        rewrite ^/account/(.*) /$1 break;
        proxy_pass http://$upstream_account:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $access_token";

        proxy_set_header Accept-Encoding "";
        sub_filter '<head>' '<head><base href="/account/">';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # Branch Manager App
    location /branch/ {
        auth_request /oauth2/auth;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;
        include /etc/nginx/includes/oauth2-auth-cookie.conf;

        set $upstream_branch fineract-ui-stack-branch.KUBE_NAMESPACE.svc.cluster.local;
        rewrite ^/branch/(.*) /$1 break;
        proxy_pass http://$upstream_branch:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $access_token";

        proxy_set_header Accept-Encoding "";
        sub_filter '<head>' '<head><base href="/branch/">';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # Asset Manager App
    location /asset-manager/ {
        auth_request /oauth2/auth;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;
        auth_request_set $auth_user_asset $upstream_http_x_auth_request_user;
        auth_request_set $auth_email_asset $upstream_http_x_auth_request_email;
        auth_request_set $auth_groups_asset $upstream_http_x_auth_request_groups;
        include /etc/nginx/includes/oauth2-auth-cookie.conf;

        set $upstream_asset_manager fineract-ui-stack-asset.KUBE_NAMESPACE.svc.cluster.local;
        rewrite ^/asset-manager/(.*) /$1 break;
        proxy_pass http://$upstream_asset_manager:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $access_token";
        proxy_set_header X-Auth-Request-User $auth_user_asset;
        proxy_set_header X-Auth-Request-Email $auth_email_asset;
        proxy_set_header X-Auth-Request-Groups $auth_groups_asset;

        proxy_set_header Accept-Encoding "";
        sub_filter '<head>' '<head><base href="/asset-manager/">';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # =========================================================================
    # Fineract API (OAuth2 protected)
    # =========================================================================
    location /fineract-provider/api/v1/batch {
        auth_request /oauth2/auth;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;
        include /etc/nginx/includes/oauth2-auth-cookie.conf;

        set $upstream_fineract_batch fineract-core-batch.KUBE_NAMESPACE.svc.cluster.local;
        proxy_pass https://$upstream_fineract_batch:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $access_token";
        proxy_set_header Fineract-Platform-TenantId $http_fineract_platform_tenantid;
    }

    location /fineract-provider/api {
        auth_request /oauth2/auth;
        auth_request_set $access_token $upstream_http_x_auth_request_access_token;
        include /etc/nginx/includes/oauth2-auth-cookie.conf;

        set $upstream_fineract_read fineract-core-read.KUBE_NAMESPACE.svc.cluster.local;
        set $upstream_fineract_write fineract-core-write.KUBE_NAMESPACE.svc.cluster.local;

        if ($request_method = GET) {
            proxy_pass https://$upstream_fineract_read:8080;
        }
        if ($request_method = POST) {
            proxy_pass https://$upstream_fineract_write:8080;
        }
        if ($request_method = PUT) {
            proxy_pass https://$upstream_fineract_write:8080;
        }
        if ($request_method = DELETE) {
            proxy_pass https://$upstream_fineract_write:8080;
        }
        if ($request_method = PATCH) {
            proxy_pass https://$upstream_fineract_write:8080;
        }

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $access_token";
        proxy_set_header Fineract-Platform-TenantId $http_fineract_platform_tenantid;
    }

    # =========================================================================
    # Nginx stub_status for metrics (e.g. Prometheus nginx-exporter)
    # =========================================================================
    location /nginx_status {
        stub_status;
        access_log off;
    }

    # =========================================================================
    # Health check endpoint
    # =========================================================================
    location = /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # =========================================================================
    # Portal Home Page (public - no OAuth2 auth required)
    # =========================================================================
    location /home/ {
        set $upstream_portal fineract-ui-stack-portal.KUBE_NAMESPACE.svc.cluster.local;
        rewrite ^/home/(.*) /$1 break;
        proxy_pass http://$upstream_portal:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/includes/security-headers.conf;
    }

    # =========================================================================
    # Logout - clears Keycloak session
    # =========================================================================
    location = /logout {
        return 302 KEYCLOAK_PUBLIC_URL/realms/fineract/protocol/openid-connect/logout?client_id=oauth2-proxy&post_logout_redirect_uri=GATEWAY_EXTERNAL_URL_ENCODED%2Fhome%2F;
    }

    # =========================================================================
    # Default - redirect to portal home page
    # =========================================================================
    location = / {
        return 302 /home/;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}

# Security headers for public (non-auth) locations.
# These locations don't include oauth2-auth-cookie.conf, so headers must be added separately.
# (nginx add_header in a location block prevents inheritance of server-level directives)
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

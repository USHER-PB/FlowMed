{{/*
=============================================================================
OAuth2-Proxy Deployment
=============================================================================
Validates: Requirements 1.5, 5.1, 5.2, 5.3, 5.4, 5.5, 5.6, 12.5, 13.5, 1.7, 14.3
=============================================================================
*/}}
{{- if .Values.oauth2Proxy.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fineract-core.fullname" . }}-oauth2-proxy
  labels:
    {{- include "fineract-core.oauth2Proxy.labels" . | nindent 4 }}
  {{- with (include "fineract-core.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.oauth2Proxy.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "fineract-core.oauth2Proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fineract-core.oauth2Proxy.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fineract-core.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: oauth2-proxy
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "fineract-core.oauth2ProxyImage" . }}
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          args:
            - --config=/etc/oauth2-proxy/oauth2_proxy.cfg
          volumeMounts:
            - name: config
              mountPath: /etc/oauth2-proxy
              readOnly: true
          env:
            {{- if .Values.secrets.oauth2Proxy.clientIdKey }}
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.oauth2Proxy.secretName }}
                  key: {{ .Values.secrets.oauth2Proxy.clientIdKey }}
            {{- end }}
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.oauth2Proxy.secretName }}
                  key: {{ .Values.secrets.oauth2Proxy.clientSecretKey | default "clientSecret" }}
            {{- if .Values.secrets.oauth2Proxy.cookieSecretKey }}
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.oauth2Proxy.secretName }}
                  key: {{ .Values.secrets.oauth2Proxy.cookieSecretKey }}
            {{- else if .Values.oauth2Proxy.cookieSecret }}
            - name: OAUTH2_PROXY_COOKIE_SECRET
              value: {{ .Values.oauth2Proxy.cookieSecret | quote }}
            {{- end }}
            {{- if .Values.oauth2Proxy.redis.enabled }}
            - name: OAUTH2_PROXY_REDIS_CONNECTION_URL
              value: {{ .Values.oauth2Proxy.redis.connectionUrl | quote }}
            {{- if .Values.oauth2Proxy.redis.existingSecret }}
            - name: OAUTH2_PROXY_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.redis.existingSecret }}
                  key: {{ .Values.oauth2Proxy.redis.secretKey | default "password" }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          startupProbe:
            httpGet:
              path: /ping
              port: http
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.oauth2Proxy.resources.requests.cpu }}
              memory: {{ .Values.oauth2Proxy.resources.requests.memory }}
            limits:
              cpu: {{ .Values.oauth2Proxy.resources.limits.cpu }}
              memory: {{ .Values.oauth2Proxy.resources.limits.memory }}
      volumes:
        - name: config
          configMap:
            name: {{ include "fineract-core.fullname" . }}-oauth2-proxy-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

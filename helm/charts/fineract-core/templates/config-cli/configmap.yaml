{{/*
=============================================================================
Config CLI ConfigMap
=============================================================================
Validates: Requirements 6.4
=============================================================================
*/}}
{{- if .Values.configCli.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fineract-core.fullname" . }}-config-cli
  labels:
    {{- include "fineract-core.configCli.labels" . | nindent 4 }}
  {{- with (include "fineract-core.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  bootstrap.json: |
    {
      "tenants": {{ .Values.configCli.bootstrapData.tenants | toJson }},
      "users": {{ .Values.configCli.bootstrapData.users | toJson }},
      "roles": {{ .Values.configCli.bootstrapData.roles | toJson }}
    }
{{- end }}

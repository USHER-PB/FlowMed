{{/*
=============================================================================
Config CLI Bootstrap Job
=============================================================================
Validates: Requirements 1.6, 6.1, 6.2, 6.3, 6.5, 6.6, 12.6
=============================================================================
*/}}
{{- if .Values.configCli.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "fineract-core.fullname" . }}-config-cli
  labels:
    {{- include "fineract-core.configCli.labels" . | nindent 4 }}
  {{- with (include "fineract-core.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  template:
    metadata:
      labels:
        {{- include "fineract-core.configCli.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fineract-core.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      restartPolicy: OnFailure
      containers:
        - name: config-cli
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "fineract-core.configCliImage" . }}
          imagePullPolicy: {{ .Values.configCli.image.pullPolicy }}
          env:
            # Fineract API connection
            - name: FINERACT_BASE_URL
              value: "http://{{ include "fineract-core.fullname" . }}-write:8080/fineract-provider"
            - name: FINERACT_TENANT
              value: "default"
            - name: FINERACT_SSL_VERIFY
              value: "false"
            # OAuth2 authentication
            - name: FINERACT_AUTH_TYPE
              value: "oauth2"
            - name: FINERACT_AUTH_OAUTH2_TOKEN_URL
              value: {{ .Values.configCli.auth.tokenUrl | default "http://keycloak:8080/realms/fineract/protocol/openid-connect/token" | quote }}
            - name: FINERACT_AUTH_OAUTH2_CLIENT_ID
              value: {{ .Values.configCli.auth.clientId | default "fineract-config" | quote }}
            - name: FINERACT_AUTH_OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.fineractApi.secretName }}
                  key: {{ .Values.secrets.fineractApi.oauth2ClientSecretKey | default "oauth2-client-secret" }}
            - name: FINERACT_AUTH_OAUTH2_GRANT_TYPE
              value: "client_credentials"
            # Config data path
            - name: CONFIG_DATA_PATH
              value: "/config/bootstrap.json"
          volumeMounts:
            - name: config-data
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: {{ .Values.configCli.resources.requests.cpu }}
              memory: {{ .Values.configCli.resources.requests.memory }}
            limits:
              cpu: {{ .Values.configCli.resources.limits.cpu }}
              memory: {{ .Values.configCli.resources.limits.memory }}
      volumes:
        - name: config-data
          configMap:
            name: {{ include "fineract-core.fullname" . }}-config-cli
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

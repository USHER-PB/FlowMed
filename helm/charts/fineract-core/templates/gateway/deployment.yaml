{{/*
 =============================================================================
 NGINX Gateway Deployment
 =============================================================================
 Validates: Requirements 1.4, 12.4, 13.4
 =============================================================================
*/}}
{{- if .Values.gateway.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fineract-core.fullname" . }}-gateway
  labels:
    {{- include "fineract-core.gateway.labels" . | nindent 4 }}
  {{- with (include "fineract-core.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.gateway.hpa.enabled }}
  replicas: {{ .Values.gateway.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fineract-core.gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fineract-core.gateway.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/gateway/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fineract-core.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "SETGID", "SETUID"]
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy | default "Always" }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port | default 80 }}
              protocol: TCP
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: gateway.conf
              readOnly: true
            - name: gateway-config
              mountPath: /etc/nginx/includes/oauth2-auth-cookie.conf
              subPath: oauth2-auth-cookie.conf
              readOnly: true
            - name: gateway-config
              mountPath: /etc/nginx/includes/security-headers.conf
              subPath: security-headers.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.port | default 80 }}
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.port | default 80 }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.port | default 80 }}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
        - name: nginx-exporter
          image: "nginx/nginx-prometheus-exporter:1.1.0"
          args: ["-nginx.scrape-uri=http://127.0.0.1:{{ .Values.gateway.port | default 80 }}/nginx_status"]
          ports:
            - containerPort: 9113
              name: metrics
          resources:
            requests:
              memory: "16Mi"
              cpu: "5m"
            limits:
              memory: "32Mi"
              cpu: "25m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: gateway-config
          configMap:
            name: {{ include "fineract-core.fullname" . }}-gateway
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

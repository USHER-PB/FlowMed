{{/*
 =============================================================================
 NGINX Gateway ConfigMap
 =============================================================================
 Validates: Requirements 1.4, 4.2, 4.3, 4.6
 =============================================================================
*/}}
{{- if .Values.gateway.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fineract-core.fullname" . }}-gateway
  labels:
    {{- include "fineract-core.gateway.labels" . | nindent 4 }}
  {{- with (include "fineract-core.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  gateway.conf: |
    {{- .Files.Get "files/nginx/gateway.conf" | replace "KUBE_DNS_RESOLVER" .Values.gateway.dnsResolver | replace "KUBE_NAMESPACE" .Release.Namespace | replace "KEYCLOAK_PUBLIC_URL" .Values.global.keycloakPublicUrl | replace "GATEWAY_EXTERNAL_URL_ENCODED" (.Values.oauth2Proxy.externalUrl | replace ":" "%3A" | replace "/" "%2F") | replace "OAUTH2_PROXY_SERVICE" (printf "%s-oauth2-proxy" (include "fineract-core.fullname" .)) | nindent 4 }}
  oauth2-auth-cookie.conf: |
    {{- .Files.Get "files/nginx/oauth2-auth-cookie.conf" | nindent 4 }}
  security-headers.conf: |
    {{- .Files.Get "files/nginx/security-headers.conf" | nindent 4 }}
{{- end }}

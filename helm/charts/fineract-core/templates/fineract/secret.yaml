{{/*
=============================================================================
Fineract Database Secret
=============================================================================
Validates: Requirements 14.1
=============================================================================
Note: For production deployments, it is recommended to use external-secrets-operator
or SealedSecrets instead of this template. This template is provided for development
and testing purposes only.
=============================================================================
*/}}
{{- if .Values.secrets.database.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.database.secretName }}
  labels:
    {{- include "fineract-core.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
  {{- with (include "fineract-core.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- if .Values.secrets.database.password }}
  password: {{ .Values.secrets.database.password | b64enc | quote }}
  {{- else }}
  # Empty password - should be set via values.yaml or external secret management
  password: {{ "" | b64enc | quote }}
  {{- end }}
{{- end }}

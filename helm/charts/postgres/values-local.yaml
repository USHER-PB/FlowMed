# =============================================================================
# PostgreSQL - Local Development Values
# =============================================================================
# Optimized for local/minikube/kind clusters
# =============================================================================

enabled: true
mode: standalone

# Simple credentials for local development
auth:
  database: appdb
  username: appuser
  password: localdev
  postgresPassword: localdev

# Minimal resources for local
resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 200m

# Small storage for local
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

# Disable network policy for local convenience
networkPolicy:
  enabled: false

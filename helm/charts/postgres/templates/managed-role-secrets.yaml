{{/*
Managed role secrets for CloudNativePG
Creates secrets of type kubernetes.io/basic-auth for each managed role
that doesn't reference an existing secret.
*/}}
{{- if and (eq .Values.mode "cnpg") .Values.cnpg.managedRoles }}
{{- range .Values.cnpg.managedRoles }}
{{- if and .passwordSecret (not .existingSecret) }}
{{- $secretName := .passwordSecret }}
{{- $roleName := .name }}
{{- $ctx := $ }}
{{- $found := false }}
{{- /* Check if this secret should be auto-generated */}}
{{- range $ctx.Values.cnpg.managedRoleSecrets }}
{{- if eq .name $secretName }}
{{- $found = true }}
{{- end }}
{{- end }}
{{- if $found }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "postgres.namespace" $ctx }}
  labels:
    {{- include "postgres.labels" $ctx | nindent 4 }}
    app.kubernetes.io/component: database-credentials
  {{- with $ctx.Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $roleName | quote }}
  {{- /* Find the password from managedRoleSecrets */}}
  {{- range $ctx.Values.cnpg.managedRoleSecrets }}
  {{- if eq .name $secretName }}
  password: {{ .password | default (randAlphaNum 32) | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

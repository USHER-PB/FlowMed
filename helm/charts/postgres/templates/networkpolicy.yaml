{{- if and .Values.networkPolicy.enabled (include "postgres.standaloneEnabled" .) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "postgres.fullname" . }}
  namespace: {{ include "postgres.namespace" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "postgres.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow connections from allowed namespaces
    {{- if .Values.networkPolicy.ingressNamespaces }}
    - from:
        {{- range $ns := .Values.networkPolicy.ingressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $ns }}
        {{- end }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
    {{- end }}
    # Allow connections from specific pods
    {{- if .Values.networkPolicy.ingressPods }}
    - from:
        {{- range $pod := .Values.networkPolicy.ingressPods }}
        - podSelector:
            matchLabels:
              {{- toYaml $pod | nindent 14 }}
        {{- end }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
    {{- end }}
    # Default: allow from same namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "postgres.namespace" . }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- with .Values.networkPolicy.egress }}
    # Custom egress rules
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}

# =============================================================================
# PostgreSQL Helm Chart - Default Values
# =============================================================================
# Supports standalone mode for local development and CNPG for HA production.
# =============================================================================

# =============================================================================
# Global Settings
# =============================================================================
global:
  # Override namespace (defaults to release namespace)
  namespace: ""
  # Image pull secrets for private registries
  imagePullSecrets: []
  # Priority class name for pods
  priorityClassName: ""

# =============================================================================
# PostgreSQL Deployment Control
# =============================================================================
# Enable PostgreSQL deployment
enabled: true

# Deployment mode:
# - "standalone": Single PostgreSQL instance (local/dev)
# - "cnpg": CloudNativePG HA cluster (Production - requires CNPG operator)
mode: standalone

# =============================================================================
# PostgreSQL Image Configuration
# =============================================================================
image:
  repository: postgres
  tag: "17-alpine"
  pullPolicy: IfNotPresent

# =============================================================================
# Authentication
# =============================================================================
# IMPORTANT: For production, use existingSecret with External Secrets Operator
# or Sealed Secrets. Never commit real passwords to git.
auth:
  # Database name to create
  database: appdb
  # Username for application access
  username: appuser
  # Password (leave empty for auto-generation)
  # WARNING: Auto-generated passwords are not suitable for production
  password: ""
  # PostgreSQL superuser password (leave empty for auto-generation)
  postgresPassword: ""
  # Replication user password (for future HA support)
  replicationPassword: ""
  # Use existing secret for credentials
  existingSecret: ""
  # Keys within the existing secret
  secretKeys:
    username: username
    password: password
    postgresPassword: postgres-password
    replicationPassword: replication-password

# =============================================================================
# Additional Databases
# =============================================================================
# Create additional databases and users
additionalDatabases: []
  # - name: keycloak
  #   user: keycloak
  #   password: ""  # Leave empty to auto-generate
  # - name: tenants
  #   user: tenant_admin
  #   password: ""

# =============================================================================
# Resource Allocation
# =============================================================================
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

# =============================================================================
# Persistence
# =============================================================================
persistence:
  enabled: true
  # Storage class (empty for default)
  storageClass: ""
  # Access modes
  accessModes:
    - ReadWriteOnce
  # Storage size
  size: 5Gi
  # Existing PVC to use (disables dynamic provisioning)
  existingClaim: ""
  # Annotations for PVC
  annotations: {}
  # Labels for PVC
  labels: {}

# =============================================================================
# Service Configuration
# =============================================================================
service:
  # Service type
  type: ClusterIP
  # Service port
  port: 5432
  # Annotations for service
  annotations: {}
  # Labels for service
  labels: {}

# =============================================================================
# Primary Instance Configuration
# =============================================================================
primary:
  # Pod affinity settings
  affinity: {}
  # Node selector
  nodeSelector: {}
  # Tolerations
  tolerations: []
  # Pod annotations
  podAnnotations: {}
  # Pod labels
  podLabels: {}
  # Security context for pod
  # NOTE: fsGroup may not work with some storage classes (e.g., Longhorn)
  # Set fsGroupChangePolicy to "OnRootMismatch" for better compatibility
  podSecurityContext:
    fsGroup: 999
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  # Container security context
  # NOTE: readOnlyRootFilesystem must be false for PostgreSQL to initialize data directory
  # This is a known limitation - PostgreSQL needs to write to /var/lib/postgresql/data
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  # Priority class name (overrides global)
  priorityClassName: ""
  # Termination grace period
  terminationGracePeriodSeconds: 30

# =============================================================================
# Health Checks
# =============================================================================
livenessProbe:
  enabled: true
  exec:
    command:
      - sh
      - -c
      - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  exec:
    command:
      - sh
      - -c
      - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  enabled: true
  exec:
    command:
      - sh
      - -c
      - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# =============================================================================
# Network Policy
# =============================================================================
networkPolicy:
  enabled: true
  # Namespaces allowed to connect
  ingressNamespaces: []
  # Specific pods allowed to connect (label selector)
  ingressPods: []
  # Egress rules
  egress: []

# =============================================================================
# Monitoring
# =============================================================================
monitoring:
  # Enable Prometheus monitoring (adds pod annotations)
  enabled: false
  # Prometheus exporter port (for pod annotation)
  # Note: Requires postgres_exporter sidecar (not included by default)
  prometheusPort: 9187
  serviceMonitor:
    # Enable ServiceMonitor resource
    enabled: false
    # Labels for ServiceMonitor
    labels: {}
    # Annotations for ServiceMonitor
    annotations: {}
    # Interval for scraping
    interval: 30s
    # Scrape timeout
    scrapeTimeout: 10s
    # Namespace for ServiceMonitor (defaults to release namespace)
    namespace: ""

# =============================================================================
# Backup Configuration
# =============================================================================
backup:
  enabled: false
  # Backup schedule (cron format)
  schedule: "0 2 * * *"
  # Backup retention (number of backups to keep)
  retention: 7
  # Backup storage size
  storage: 10Gi
  # S3/MinIO backup configuration
  s3:
    enabled: false
    endpoint: ""
    bucket: ""
    existingSecret: ""
    secretKeys:
      accessKey: access-key
      secretKey: secret-key

# =============================================================================
# Init Scripts
# =============================================================================
# Custom init scripts to run on first start
initScripts: {}
  # 01-init.sql: |
  #   CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

# ConfigMap with init scripts
initScriptsConfigMap: ""

# =============================================================================
# PostgreSQL Configuration
# =============================================================================
# PostgreSQL configuration parameters
config: {}
  # max_connections: "200"
  # shared_buffers: "128MB"
  # work_mem: "4MB"

# PostgreSQL host-based authentication rules
pgHbaConfiguration: ""
  # local all all trust
  # host all all 127.0.0.1/32 md5

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  # Create service account
  create: true
  # Service account name (defaults to release name)
  name: ""
  # Annotations for service account
  annotations: {}
  # Labels for service account
  labels: {}

# =============================================================================
# Pod Disruption Budget
# =============================================================================
pdb:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# =============================================================================
# Common Labels and Annotations
# =============================================================================
commonLabels: {}
commonAnnotations: {}

# =============================================================================
# CloudNativePG Configuration (when mode: cnpg)
# =============================================================================
# CloudNativePG provides production-grade HA PostgreSQL on Kubernetes.
# Requires the CNPG operator to be installed first:
#   helm repo add cnpg https://cloudnative-pg.github.io/charts
#   helm install cnpg cnpg/cloudnative-pg -n cnpg-system --create-namespace
cnpg:
  # Number of PostgreSQL instances (1 primary + N replicas)
  # Minimum 3 recommended for HA (1 primary + 2 replicas)
  instances: 3
  
  # PostgreSQL image (defaults to image.repository:image.tag)
  imageName: ""
  
  # PostgreSQL configuration
  postgresql:
    # Memory
    sharedBuffers: "256MB"
    effectiveCacheSize: "768MB"
    workMem: "16MB"
    maintenanceWorkMem: "128MB"
    # Connections
    maxConnections: "200"
    # WAL (maxWalSize must be smaller than walStorage.size)
    walLevel: "replica"
    maxWalSize: "512MB"
    minWalSize: "128MB"
    # Checkpoints
    checkpointCompletionTarget: "0.9"
    # Query planning
    randomPageCost: "1.1"
    effectiveIoConcurrency: "200"
    # Parallel queries
    maxParallelWorkersPerGather: "2"
    maxParallelWorkers: "4"
    # Logging
    logStatement: "ddl"
    logMinDurationStatement: "1000"
    # Additional parameters
    extraParameters: {}
    # pg_hba.conf rules
    pgHBA: []
    # - host all all 10.0.0.0/8 scram-sha-256
    # - host all all 172.16.0.0/12 scram-sha-256
    # Synchronous replication for data durability
    synchronous:
      method: "any"  # any, first, or off
      number: 1
      dataDurability: "required"  # required, preferred, or off
  
  # Bootstrap configuration
  bootstrap:
    initdb:
      # Secret containing app user credentials
      secret: ""
      # Post-init SQL commands
      postInitSQL: []
      # - CREATE EXTENSION IF NOT EXISTS "uuid-ossp"
      postInitApplicationSQL: []
      # Initdb options
      options: []
    # Recovery from backup (for replica clusters)
    recovery:
      source: ""
      targetTime: ""
  
  # Application secret (for app user)
  appSecret: ""
  
  # Storage configuration
  storage:
    resizeInUseVolumes: true
    pvcTemplate: {}
  
  # WAL storage (separate from data)
  walStorage:
    enabled: true
    size: "1Gi"
  
  # Affinity for HA pod distribution
  affinity:
    # Enable pod anti-affinity to spread instances across nodes
    enablePodAntiAffinity: true
    # Type: "required" (hard) or "preferred" (soft)
    podAntiAffinityType: "preferred"
    # Topology key for anti-affinity
    topologyKey: "kubernetes.io/hostname"
    # Node affinity
    nodeAffinity: {}
  
  # Primary update strategy
  primaryUpdateStrategy: "unsupervised"  # supervised, unsupervised
  primaryUpdateMethod: "restart"  # restart, switchover
  
  # Backup configuration (Barman)
  backup:
    enabled: false
    # S3/MinIO destination path
    destinationPath: ""
    # Endpoint URL (for MinIO)
    endpointURL: ""
    # S3 credentials secret
    s3Credentials:
      secretName: ""
      accessKeyIdKey: "access-key-id"
      secretAccessKeyKey: "secret-access-key"
    # WAL archiving
    wal:
      compression: "gzip"
      maxParallel: 2
      minFlushInterval: "5s"
    # Data backups
    data:
      compression: "gzip"
      immediateCheckpoint: false
      jobs: 2
    # Retention policy
    retentionPolicy: "30d"
  
  # Monitoring
  monitoring:
    customQueries: []
    # - name: "pg_stat_statements"
    #   query: "SELECT * FROM pg_stat_statements"
    #   metrics:
    #     - query_duration_seconds:
    #         usage: "GAUGE"
    #         description: "Query duration"
  
  # Replication slots
  replicationSlots:
    enabled: true
    slotPrefix: "_cnpg_"
    synchronizeReplicas: {}
  
  # Log level
  logLevel: "info"
  
  # PostgreSQL UID/GID
  # NOTE: CNPG images use UID 26, standard postgres images use UID 999
  # Leave empty for CNPG to use its default (26)
  # Only set for standalone mode with standard postgres images
  postgresUID: ""
  postgresGID: ""
  
  # Extra volumes
  extraVolumes: []
  
  # Extra volume mounts
  extraVolumeMounts: []
  
  # Sidecar containers
  sidecars: []
  
  # Environment variables
  env: []
  envFrom: []
  
  # Annotations for the cluster
  annotations: {}
  
  # Tablespaces configuration
  tablespaces: []
  
  # Inheritance (for replica clusters)
  inheritance: {}
  
  # External clusters (for distributed topology)
  externalClusters: []

# =============================================================================
# Data Store - Local Development Values
# =============================================================================
# Optimized for local/minikube/kind clusters
# =============================================================================

# =============================================================================
# PostgreSQL Configuration
# =============================================================================
postgres:
  enabled: true
  mode: standalone
  
  # Simple credentials for local development
  auth:
    database: appdb
    username: appuser
    password: localdev
    postgresPassword: localdev
  
  # Minimal resources for local
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m
  
  # Small storage for local
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""  # Use default
  
  # Disable network policy for local convenience
  networkPolicy:
    enabled: false

# =============================================================================
# MinIO Configuration
# =============================================================================
minio:
  enabled: true
  mode: standalone
  
  # Simple credentials for local development
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  
  # Buckets for local development
  buckets:
    - name: documents
      policy: none
    - name: backups
      policy: none
    - name: uploads
      policy: none
    - name: temp
      policy: none
  
  # Minimal resources for local
  resources:
    requests:
      memory: 64Mi
      cpu: 25m
    limits:
      memory: 128Mi
      cpu: 100m
  
  # Small storage for local
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""  # Use default
  
  # Enable console for local development
  console:
    enabled: true
    ingress:
      enabled: false  # Use port-forward instead
  
  # Disable network policy for local convenience
  networkPolicy:
    enabled: false
  
  # Enable bucket init job
  bucketInit:
    enabled: true

# Default values for asset-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas (overridden by HPA if enabled)
replicaCount: 1

# Image configuration
image:
  registry: ghcr.io
  repository: adorsys-gis/fineract-apps/asset-service
  tag: "latest"
  pullPolicy: Always

# Image pull secrets for private registries
imagePullSecrets: []
# - name: regcred

# Override chart name
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  create: true
  name: ""
  automount: false
  annotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: ClusterIP
  port: 8083
  targetPort: 8083
  annotations: {}

# Management/Actuator port
management:
  port: 8084

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

# Resource limits and requests
resources:
  requests:
    memory: "320Mi"
    cpu: "100m"
  limits:
    memory: "640Mi"
    cpu: "500m"

# Java JVM options
javaOpts: "-Xmx320m -Xms160m"

# Full JIT for production throughput (false = faster startup)
fullJit: false

# Tmp volume size limit
tmpVolumeSizeLimit: "256Mi"

# Liveness probe configuration
livenessProbe:
  enabled: true
  httpGet:
    path: /actuator/health/liveness
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  enabled: true
  httpGet:
    path: /actuator/health/readiness
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

# Startup probe configuration
startupProbe:
  enabled: true
  httpGet:
    path: /actuator/health
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 120

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ~
  behavior: {}

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ~

# Network Policy
networkPolicy:
  enabled: false
  ingressNamespace: "ingress-nginx"

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Annotations for deployment
annotations: {}

# Init containers configuration
initContainers:
  waitForDependencies:
    enabled: true
    image: busybox:1.36.1
    maxAttempts: 24
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65534
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        memory: "16Mi"
        cpu: "10m"
      limits:
        memory: "32Mi"
        cpu: "50m"

# Configuration settings
config:
  # Keycloak OAuth2 configuration
  keycloak:
    url: "http://keycloak:8080"
    realm: "master"
    clientId: "asset-service"
    clientSecret: ""  # Set via sealed-secret
    port: 8080

  # Fineract API configuration
  fineract:
    url: "https://fineract-core-write:8080"
    host: "fineract-core-write"
    port: 8080
    tenant: "default"
    username: "mifos"
    password: ""  # Set via sealed-secret

  # Database configuration
  database:
    host: "postgres"
    port: 5432
    url: "jdbc:postgresql://postgres:5432/asset_service"
    username: "asset_service"
    password: ""  # Set via sealed-secret
    hikari:
      maximumPoolSize: 20
      minimumIdle: 5
      connectionTimeout: 3000
      idleTimeout: 60000
      maxLifetime: 1800000

  # Redis configuration
  redis:
    enabled: false
    host: "redis"
    port: 6379
    password: ""  # Set via sealed-secret
    existingSecret: ""
    pool:
      maxActive: 20
      maxIdle: 10
      minIdle: 2

  # GL Account codes (SYSCOHADA-aligned)
  glAccounts:
    digitalAssetInventory: "301"
    customerDigitalAssetHoldings: "4102"
    transfersInSuspense: "4501"
    incomeFromInterest: "701"
    feeIncome: "701"
    fundSource: "502"
    savingsControl: "4101"
    platformFeePayable: "4201"
    expenseAccount: "601"

  # Accounting references
  accounting:
    feeCollectionAccountExternalId: "PLATFORM-CLEARING"

  # LP-specific GL Account codes
  lpGlAccounts:
    fundSource: ""
    savingsControl: ""
    spreadPayable: ""
    taxWithholding: ""
    transfersInSuspense: ""

  # LP savings product short names
  lpSavingsProductShortName: ""
  lpSpreadProductShortName: ""
  lpTaxProductShortName: ""

  # Tax configuration (Cameroon/CEMAC)
  tax:
    authorityExternalId: ""
    registrationDutyAccountExternalId: ""
    ircmAccountExternalId: ""
    capitalGainsAccountExternalId: ""
    tvaAccountExternalId: ""
    defaultRegistrationDutyRate: ""
    defaultIrcmDividendRate: ""
    defaultIrcmBvmacRate: ""
    defaultIrcmBondRate: ""
    defaultCapitalGainsRate: ""
    defaultTvaRate: ""
    capitalGainsAnnualExemption: ""

  # Asset issuance payment type
  assetIssuancePaymentType: ""

  # Market hours
  marketHours:
    open: "09:00"
    close: "17:00"
    weekendTradingEnabled: false

  # Security
  security:
    permitAllAdmin: "true"
    corsAllowedOrigins: "*"

  # Storage (MinIO / S3)
  storage:
    endpoint: "http://minio:9000"
    region: "default"
    bucket: "assets"
    accessKey: ""  # Set via sealed-secret
    secretKey: ""  # Set via sealed-secret
    publicBaseUrl: ""

  # Bond pricing
  bondPricing:
    markToMarketEnabled: true
    accruedInterestEnabled: true
    cleanPriceSource: "lp_bid"

  # Rate limiting
  rateLimitEnabled: true

# Tracing configuration
tracing:
  enabled: false
  samplingProbability: "1.0"
  otelEndpoint: "http://otel-collector:4317"

# Extra environment variables
extraEnv: []

# Existing secret for credentials (if using sealed-secrets)
existingSecret: ""

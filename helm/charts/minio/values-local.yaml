# =============================================================================
# MinIO - Local Development Values
# =============================================================================
# Optimized for local/minikube/kind clusters
# =============================================================================

enabled: true
mode: standalone

# Simple credentials for local development
auth:
  rootUser: minioadmin
  rootPassword: minioadmin

# Buckets for local development
buckets:
  - name: documents
    policy: none
  - name: backups
    policy: none
  - name: uploads
    policy: none
  - name: temp
    policy: none

# Minimal resources for local
resources:
  requests:
    memory: 64Mi
    cpu: 25m
  limits:
    memory: 128Mi
    cpu: 100m

# Small storage for local
persistence:
  enabled: true
  size: 2Gi
  storageClass: ""

# Enable console for local development
console:
  enabled: true
  ingress:
    enabled: false

# Disable network policy for local convenience
networkPolicy:
  enabled: false

# Enable bucket init job
bucketInit:
  enabled: true

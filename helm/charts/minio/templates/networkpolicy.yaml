{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "minio.fullname" . }}
  namespace: {{ include "minio.namespace" . }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "minio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow connections from allowed namespaces
    {{- if .Values.networkPolicy.ingressNamespaces }}
    - from:
        {{- range $ns := .Values.networkPolicy.ingressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $ns }}
        {{- end }}
      ports:
        - port: {{ .Values.service.apiPort }}
          protocol: TCP
        {{- if .Values.console.enabled }}
        - port: {{ .Values.service.consolePort }}
          protocol: TCP
        {{- end }}
    {{- end }}
    # Allow connections from specific pods
    {{- if .Values.networkPolicy.ingressPods }}
    - from:
        {{- range $pod := .Values.networkPolicy.ingressPods }}
        - podSelector:
            matchLabels:
              {{- toYaml $pod | nindent 14 }}
        {{- end }}
      ports:
        - port: {{ .Values.service.apiPort }}
          protocol: TCP
        {{- if .Values.console.enabled }}
        - port: {{ .Values.service.consolePort }}
          protocol: TCP
        {{- end }}
    {{- end }}
    # Default: allow from same namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "minio.namespace" . }}
      ports:
        - port: {{ .Values.service.apiPort }}
          protocol: TCP
        {{- if .Values.console.enabled }}
        - port: {{ .Values.service.consolePort }}
          protocol: TCP
        {{- end }}
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if not (include "minio.standaloneEnabled" .) }}
    # Distributed mode: Allow inter-pod communication for erasure coding
    - to:
        - podSelector:
            matchLabels:
              {{- include "minio.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: server
      ports:
        - port: {{ .Values.service.apiPort }}
          protocol: TCP
        {{- if .Values.console.enabled }}
        - port: {{ .Values.service.consolePort }}
          protocol: TCP
        {{- end }}
    {{- end }}
    {{- with .Values.networkPolicy.egress }}
    # Custom egress rules
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}

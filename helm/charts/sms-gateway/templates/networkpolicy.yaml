{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sms-gateway.fullname" . }}
  labels:
    {{- include "sms-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sms-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
    # Allow ingress from same namespace pods
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - port: {{ .Values.config.database.port | default 5432 }}
          protocol: TCP
    # Allow egress to Redis (if enabled)
    {{- if .Values.config.redis.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - port: {{ .Values.config.redis.port | default 6379 }}
          protocol: TCP
    {{- end }}
    # Allow egress to MinIO
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - port: 9000
          protocol: TCP
    # Allow egress to external SMS providers (HTTPS)
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
{{- end }}

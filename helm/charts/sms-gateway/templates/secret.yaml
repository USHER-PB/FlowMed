{{- if not .Values.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sms-gateway.fullname" . }}-credentials
  labels:
    {{- include "sms-gateway.labels" . | nindent 4 }}
type: Opaque
data:
  # Database credentials
  db-password: {{ .Values.config.database.password | b64enc | quote }}
  
  # Redis password (if enabled)
  {{- if .Values.config.redis.enabled }}
  redis-password: {{ .Values.config.redis.password | b64enc | quote }}
  {{- end }}
  
  # Storage credentials
  storage-access-key: {{ .Values.config.storage.accessKey | b64enc | quote }}
  storage-secret-key: {{ .Values.config.storage.secretKey | b64enc | quote }}
  
  # SMS Provider credentials
  {{- if .Values.providers.avlytext.enabled }}
  avlytext-api-key: {{ .Values.providers.avlytext.apiKey | b64enc | quote }}
  {{- end }}
  
  {{- if .Values.providers.orange.enabled }}
  orange-sms-client-secret: {{ .Values.providers.orange.clientSecret | b64enc | quote }}
  {{- end }}
{{- end }}

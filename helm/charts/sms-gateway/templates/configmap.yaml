apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sms-gateway.fullname" . }}-config
  labels:
    {{- include "sms-gateway.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      address: "0.0.0.0"
      port: {{ .Values.service.targetPort }}
      tls:
        enabled: false
        port: 3443
        cert_path: "./config/tls/api.crt"
        key_path: "./config/tls/api.key"

    logging:
      level: {{ .Values.config.logLevel | default "info" | quote }}
      log_requests_enabled: true

    database:
      url: ${DATABASE_URL}
      pool_size: {{ .Values.config.database.poolSize | default 5 }}

    runtime:
      mode: shared

    {{- if .Values.config.redis.enabled }}
    redis:
      url: ${REDIS_URL}
    {{- end }}

    storage:
      type: minio
      minio:
        endpoint: ${MINIO_ENDPOINT}
        region: ${MINIO_REGION}
        access_key: ${MINIO_ACCESS_KEY}
        secret_key: ${MINIO_SECRET_KEY}
        bucket: ${MINIO_BUCKET}
        force_path_style: true
        presign_ttl_seconds: 900

    oauth2:
      issuer: {{ .Values.config.oauth2.issuer | quote }}
      base-paths: []

    kc:
      enabled: false
      base-path: "/kc"
      signature_secret: "unused"
      max_clock_skew_seconds: 60
      max_body_bytes: 262144

    bff:
      enabled: false
      base-path: "/bff"

    staff:
      enabled: false
      base-path: "/staff"

    cuss:
      api_url: {{ .Values.config.cuss.apiUrl | quote }}

    sms:
      provider: {{ .Values.config.sms.provider | quote }}
      {{- if .Values.providers.avlytext.enabled }}
      avlytext:
        base_url: {{ .Values.providers.avlytext.baseUrl | quote }}
        api_key: ${AVLYTEXT_API_KEY}
        sender_id: {{ .Values.providers.avlytext.senderId | quote }}
      {{- end }}
      {{- if .Values.providers.orange.enabled }}
      orange:
        client_id: {{ .Values.providers.orange.clientId | quote }}
        client_secret: ${ORANGE_SMS_CLIENT_SECRET}
        token_url: {{ .Values.providers.orange.tokenUrl | quote }}
        sms_base_url: {{ .Values.providers.orange.smsBaseUrl | quote }}
        contract_url: {{ .Values.providers.orange.contractUrl | quote }}
        default_sender: {{ .Values.providers.orange.defaultSender | quote }}
      {{- end }}

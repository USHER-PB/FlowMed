# Default values for payment-gateway.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas (overridden by HPA if enabled)
replicaCount: 1

# Image configuration
image:
  registry: ghcr.io
  repository: adorsys-gis/fineract-apps/payment-gateway-service
  tag: "latest"
  pullPolicy: Always

# Image pull secrets for private registries
imagePullSecrets: []
# - name: regcred

# Override chart name
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  create: true
  name: ""
  automount: false
  annotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: ClusterIP
  port: 8082
  targetPort: 8082
  annotations: {}

# Management/Actuator port
management:
  port: 8084

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

# Resource limits and requests
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Java JVM options
javaOpts: "-Xmx256m -Xms128m"

# Tmp volume size limit
tmpVolumeSizeLimit: "256Mi"

# Liveness probe configuration
livenessProbe:
  enabled: true
  httpGet:
    path: /actuator/health/liveness
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  enabled: true
  httpGet:
    path: /actuator/health/readiness
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

# Startup probe configuration
startupProbe:
  enabled: true
  httpGet:
    path: /actuator/health
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 60

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ~
  behavior: {}

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ~

# Network Policy
networkPolicy:
  enabled: false
  ingressNamespace: "ingress-nginx"

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Annotations for deployment
annotations: {}

# Init containers configuration
initContainers:
  waitForDependencies:
    enabled: true
    image: busybox:1.36.1
    maxAttempts: 24
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65534
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        memory: "16Mi"
        cpu: "10m"
      limits:
        memory: "32Mi"
        cpu: "50m"

# Configuration settings
config:
  # Keycloak OAuth2 configuration
  keycloak:
    url: "http://keycloak:8080"
    realm: "master"
    clientId: "payment-gateway"
    clientSecret: ""  # Set via sealed-secret
    port: 8080

  # Fineract API configuration
  fineract:
    url: "https://fineract:8443"
    host: "fineract"
    port: 8443
    tenant: "default"
    username: "mifos"
    password: ""  # Set via sealed-secret
    savingsProductId: ""

  # Database configuration
  database:
    host: "postgres"
    port: 5432
    url: "jdbc:postgresql://postgres:5432/payment_gateway"
    username: "payment_gateway"
    password: ""  # Set via sealed-secret

  # Redis configuration
  redis:
    enabled: false
    host: "redis"
    port: 6379
    password: ""  # Set via sealed-secret
    existingSecret: ""

  # Spring profile
  springProfile: "default"

# Payment providers configuration
providers:
  # MTN Mobile Money
  mtn:
    enabled: false
    baseUrl: "https://momodeveloper.mtn.com"
    targetEnv: "mtn-cameroon"
    apiUserId: ""
    apiKey: ""  # Set via sealed-secret
    collectionKey: ""  # Set via sealed-secret
    disbursementKey: ""  # Set via sealed-secret
    callbackUrl: ""
    glAccountCode: ""

  # Orange Money
  orange:
    enabled: false
    baseUrl: "https://api.orange.com"
    clientId: ""
    clientSecret: ""  # Set via sealed-secret
    merchantCode: ""
    glAccountCode: ""

  # CinetPay
  cinetpay:
    enabled: false
    baseUrl: "https://api.cinetpay.com"
    siteId: ""
    apiKey: ""  # Set via sealed-secret
    apiPassword: ""  # Set via sealed-secret

  # Nokash
  nokash:
    enabled: false
    baseUrl: ""
    iSpaceKey: ""  # Set via sealed-secret
    appSpaceKey: ""  # Set via sealed-secret
    fineractPaymentTypeId: ""
    callbackUrl: ""
    glAccountCode: ""
    senderFirstName: "Platform"
    senderLastName: "Services"

# Scheduler configuration for stale transaction cleanup
scheduler:
  enabled: true
  staleMinutes: 30
  intervalMs: 300000

# Tracing configuration
tracing:
  enabled: false
  samplingProbability: "1.0"
  otelEndpoint: "http://otel-collector:4317"

# Extra environment variables
extraEnv: []

# Existing secret for credentials (if using sealed-secrets)
existingSecret: ""

{{- if not .Values.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "payment-gateway.fullname" . }}-credentials
  labels:
    {{- include "payment-gateway.labels" . | nindent 4 }}
type: Opaque
data:
  # Database credentials
  db-password: {{ .Values.config.database.password | b64enc | quote }}
  
  # Keycloak credentials
  keycloak-client-secret: {{ .Values.config.keycloak.clientSecret | b64enc | quote }}
  
  # Fineract credentials
  fineract-password: {{ .Values.config.fineract.password | b64enc | quote }}
  
  # Redis password (if enabled)
  {{- if .Values.config.redis.enabled }}
  redis-password: {{ .Values.config.redis.password | b64enc | quote }}
  {{- end }}
  
  # MTN MoMo credentials
  {{- if .Values.providers.mtn.enabled }}
  mtn-collection-key: {{ .Values.providers.mtn.collectionKey | b64enc | quote }}
  mtn-disbursement-key: {{ .Values.providers.mtn.disbursementKey | b64enc | quote }}
  mtn-api-key: {{ .Values.providers.mtn.apiKey | b64enc | quote }}
  {{- end }}
  
  # Orange Money credentials
  {{- if .Values.providers.orange.enabled }}
  orange-client-secret: {{ .Values.providers.orange.clientSecret | b64enc | quote }}
  {{- end }}
  
  # CinetPay credentials
  {{- if .Values.providers.cinetpay.enabled }}
  cinetpay-api-key: {{ .Values.providers.cinetpay.apiKey | b64enc | quote }}
  cinetpay-api-password: {{ .Values.providers.cinetpay.apiPassword | b64enc | quote }}
  {{- end }}
  
  # Nokash credentials
  {{- if .Values.providers.nokash.enabled }}
  nokash-i-space-key: {{ .Values.providers.nokash.iSpaceKey | b64enc | quote }}
  nokash-app-space-key: {{ .Values.providers.nokash.appSpaceKey | b64enc | quote }}
  {{- end }}
{{- end }}

apiVersion: v2
name: longhorn
description: |
  Longhorn distributed block storage for Kubernetes.
  Provides cloud-native distributed storage for local and on-prem deployments.
  For cloud deployments (AKS, GKE, EKS), use the provider's managed storage instead.
type: application
version: 1.0.0
appVersion: "1.7.0"

maintainers:
  - name: OM Platform Team
    email: platform@example.com

keywords:
  - storage
  - block-storage
  - distributed
  - longhorn
  - local-storage
  - on-prem

home: https://longhorn.io
sources:
  - https://github.com/longhorn/longhorn

annotations:
  category: Storage
  licenses: Apache-2.0

dependencies:
  - name: longhorn
    version: "1.7.0"
    repository: "https://charts.longhorn.io"
    condition: longhorn.enabled

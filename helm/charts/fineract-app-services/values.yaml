# Fineract App Services - Umbrella Chart Values
# yaml-language-server: $schema=values.schema.json

# -----------------------------------------------------------------------------
# Global Configuration
# -----------------------------------------------------------------------------
global:
  # Image pull secrets for private registries
  imagePullSecrets:
    - name: ghcr-credentials

  # Keycloak OAuth2 configuration
  keycloakUrl: "http://keycloak:8080"
  keycloakPublicUrl: "http://localhost:8180"
  realm: fineract

  # Fineract core banking URL
  fineractUrl: "https://fineract-core-write:8080/fineract-provider"

  # OpenTelemetry collector endpoint
  otelEndpoint: "http://otel-collector:4317"

  # Storage configuration (MinIO for local, S3 for cloud)
  storage:
    endpoint: "http://data-store-minio:9000"
    bucket: fineract-assets
    region: us-east-1
    accessKey: minioadmin
    secretKey: minioadmin
    publicBaseUrl: "http://localhost:9000/fineract-assets"

  # PostgreSQL connection defaults
  postgres:
    host: data-store-postgres-rw
    port: 5432

  # Redis configuration
  redis:
    host: infra-cache-redis
    port: 6379

# -----------------------------------------------------------------------------
# Secrets Management
# -----------------------------------------------------------------------------
secrets:
  # "generate" for local dev, "existing" for cloud environments
  mode: generate

# Network policies
networkPolicies:
  enabled: true

# -----------------------------------------------------------------------------
# Payment Gateway Service
# -----------------------------------------------------------------------------
payment-gateway:
  enabled: true

  replicaCount: 1

  # Image pull secrets for private registries
  imagePullSecrets:
    - name: ghcr-credentials

  image:
    registry: ghcr.io
    repository: adorsys-gis/fineract-apps/payment-gateway-service
    tag: "4382f407"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8082

  # Configuration overrides for subchart
  config:
    # Keycloak OAuth2
    keycloak:
      url: "http://keycloak:8080"
      realm: "fineract"
      clientId: payment-gateway
      clientSecret: payment-gateway-secret
      port: 8080

    # Fineract connection
    fineract:
      url: "https://fineract-core-write:8080"
      host: "fineract-core-write"
      port: 8080
      tenant: "default"
      username: mifos
      password: password
      savingsProductId: "1"

    # Database
    database:
      host: "data-store-postgres-rw"
      port: 5432
      url: "jdbc:postgresql://data-store-postgres-rw:5432/payment_gateway"
      name: payment_gateway
      username: payment_gateway
      password: payment_gateway_password
      hikari:
        maximumPoolSize: "10"
        minimumIdle: "3"
        connectionTimeout: "5000"
        idleTimeout: "60000"
        maxLifetime: "1800000"

    # Redis
    redis:
      enabled: true
      host: "infra-cache-redis"
      port: 6379
      existingSecret: "infra-cache-redis-auth"

  # Keycloak OAuth2 (legacy format)
  keycloak:
    clientId: payment-gateway
    clientSecret: payment-gateway-secret

  # Fineract connection (legacy format)
  fineract:
    username: mifos
    password: password
    savingsProductId: "1"

  # Database (legacy format)
  database:
    name: payment_gateway
    username: payment_gateway
    password: payment_gateway_password

  # Payment providers (disabled for development - requires real API keys)
  providers:
    mtn:
      enabled: false
      baseUrl: "https://sandbox.momodeveloper.mtn.com"
      targetEnv: sandbox
      collectionKey: ""
      disbursementKey: ""
      apiUserId: ""
      apiKey: ""
      callbackUrl: ""
      glAccountCode: "5001"
    orange:
      enabled: false
      baseUrl: "https://api.orange.com/orange-money-webpay/dev/v1"
      clientId: ""
      clientSecret: ""
      merchantCode: ""
      glAccountCode: "5002"
    cinetpay:
      enabled: false
      baseUrl: "https://api-checkout.cinetpay.com"
      apiKey: ""
      siteId: "0"
    nokash:
      enabled: false
      baseUrl: "https://api.nokash.app"
      fineractPaymentTypeId: "3"
      iSpaceKey: ""
      appSpaceKey: ""
      callbackUrl: ""
      glAccountCode: "5003"

  # JVM options
  javaOpts: "-Xmx256m -Xms128m"

  # Resources
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "448Mi"
      cpu: "500m"

  # Autoscaling
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

  # Use existing secret
  existingSecret: "payment-gateway-credentials"

# -----------------------------------------------------------------------------
# Asset Service
# -----------------------------------------------------------------------------
asset-service:
  enabled: true

  replicaCount: 1

  # Image pull secrets for private registries
  imagePullSecrets:
    - name: ghcr-credentials

  image:
    registry: ghcr.io
    repository: adorsys-gis/fineract-apps/asset-service
    tag: "768042b0"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8083
    managementPort: 8084

  # Configuration overrides for subchart
  config:
    # Keycloak OAuth2
    keycloak:
      url: "http://keycloak:8080"
      realm: "fineract"
      clientId: asset-service
      clientSecret: asset-service-secret
      port: 8080

    # Fineract connection
    fineract:
      url: "https://fineract-core-write:8080"
      host: "fineract-core-write"
      port: 8080
      tenant: "default"
      username: "mifos"
      password: fineract_dev_password

    # Database
    database:
      host: "data-store-postgres-rw"
      port: 5432
      url: "jdbc:postgresql://data-store-postgres-rw:5432/asset_service"
      name: asset_service
      username: asset_service
      password: asset_service_password
      hikari:
        maximumPoolSize: "20"
        minimumIdle: "5"
        connectionTimeout: "3000"
        idleTimeout: "60000"
        maxLifetime: "1800000"

    # Redis
    redis:
      enabled: true
      host: "infra-cache-redis"
      port: 6379
      existingSecret: "infra-cache-redis-auth"

    # GL Account codes (SYSCOHADA-aligned)
    glAccounts:
      digitalAssetInventory: "301"
      customerDigitalAssetHoldings: "4102"
      transfersInSuspense: "4501"
      savingsControl: "4101"
      incomeFromInterest: "701"
      feeIncome: "701"
      fundSource: "502"
      platformFeePayable: "4201"
      expenseAccount: "601"

    accounting:
      feeCollectionAccountExternalId: "PLATFORM-CLEARING"

    # LP-specific GL Account codes
    lpGlAccounts:
      fundSource: "5011"
      savingsControl: "4011"
      spreadPayable: "4012"
      taxWithholding: "4013"
      transfersInSuspense: "4501"

    # LP savings product short names
    lpSavingsProductShortName: "LSAV"
    lpSpreadProductShortName: "LSPD"
    lpTaxProductShortName: "LTAX"

    # Tax configuration (Cameroon/CEMAC)
    tax:
      authorityExternalId: "TAX-AUTHORITY"
      registrationDutyAccountExternalId: "TAX-REG-DUTY"
      ircmAccountExternalId: "TAX-IRCM"
      capitalGainsAccountExternalId: "TAX-CAP-GAINS"
      tvaAccountExternalId: "TAX-TVA"
      defaultRegistrationDutyRate: "0.02"
      defaultIrcmDividendRate: "0.165"
      defaultIrcmBvmacRate: "0.11"
      defaultIrcmBondRate: "0.055"
      defaultCapitalGainsRate: "0.165"
      defaultTvaRate: "0.1925"
      capitalGainsAnnualExemption: "500000"

    assetIssuancePaymentType: "Asset Issuance"

    # Market hours
    marketHours:
      open: "00:00"
      close: "23:59"
      weekendTradingEnabled: true

    # Security
    security:
      permitAllAdmin: "false"
      corsAllowedOrigins: "http://localhost:4209,http://localhost:3000,http://localhost:5173,http://localhost:8080"

    # Rate limiting
    rateLimitEnabled: "true"

  # Keycloak OAuth2 (legacy format)
  keycloak:
    clientId: asset-service
    clientSecret: asset-service-secret

  # Fineract connection (legacy format)
  fineract:
    password: fineract_dev_password

  # Database (legacy format)
  database:
    name: asset_service
    username: asset_service
    password: asset_service_password

  # JVM options
  javaOpts: "-Xmx320m -Xms160m"
  fullJit: false

  # Resources
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # Autoscaling
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

  # Tracing
  tracing:
    samplingProbability: "1.0"

  # Use existing secret
  existingSecret: "asset-service-credentials"

# -----------------------------------------------------------------------------
# Customer Self-Service
# -----------------------------------------------------------------------------
customer-self-service:
  enabled: true

  replicaCount: 1

  # Image pull secrets for private registries
  imagePullSecrets:
    - name: ghcr-credentials

  image:
    registry: ghcr.io
    repository: adorsys-gis/fineract-apps/customer-self-service
    tag: "169deecc"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8080

  # Configuration overrides for subchart
  config:
    # Keycloak OAuth2
    keycloak:
      url: "http://keycloak:8080"
      realm: "fineract"
      clientId: customer-registration
      clientSecret: customer-registration-secret
      port: 8080

    # Fineract connection
    fineract:
      url: "https://fineract-core-write:8080"
      host: "fineract-core-write"
      port: 8080
      tenant: "default"
      username: mifos
      password: password

    # Database
    database:
      host: "data-store-postgres-rw"
      port: 5432
      url: "jdbc:postgresql://data-store-postgres-rw:5432/customer_registration"
      name: customer_registration
      username: customer_reg
      password: customer_reg_password
      hikari:
        maximumPoolSize: "10"
        minimumIdle: "3"
        connectionTimeout: "5000"
        idleTimeout: "60000"
        maxLifetime: "1800000"

    # KYC configuration
    kyc:
      defaultOfficeId: "1"
      defaultGroupPath: "/self-service-customers"
      defaultKycTier: "1"
      defaultKycStatus: pending

    # Redis configuration
    redis:
      enabled: true
      host: "infra-cache-redis"
      port: 6379
      existingSecret: "infra-cache-redis-auth"

  # Keycloak OAuth2 (legacy format)
  keycloak:
    clientId: customer-registration
    clientSecret: customer-registration-secret

  # Database (legacy format)
  database:
    name: customer_registration
    username: customer_reg
    password: customer_reg_password

  # Fineract connection (legacy format)
  fineract:
    username: mifos
    password: password

  # JVM options
  javaOpts: "-Xmx160m -Xms80m"

  # Resources
  resources:
    requests:
      memory: "160Mi"
      cpu: "50m"
    limits:
      memory: "320Mi"
      cpu: "500m"

  # Autoscaling
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70

  # Tracing
  tracing:
    samplingProbability: "1.0"

  # Use existing secret
  existingSecret: "customer-self-service-credentials"

# -----------------------------------------------------------------------------
# SMS Gateway
# -----------------------------------------------------------------------------
sms-gateway:
  enabled: true

  replicaCount: 1

  # Image pull secrets for private registries
  imagePullSecrets:
    - name: ghcr-credentials

  image:
    registry: ghcr.io
    repository: adorsys-gis/sms-gateway
    tag: "latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8080

  # Application configuration
  config:
    database:
      host: data-store-postgres-rw
      port: 5432
      name: user_storage
    storage:
      endpoint: "http://data-store-minio:9000"
      bucket: sms-storage
    sms:
      provider: avlytext

  # SMS providers
  providers:
    avlytext:
      enabled: true
      baseUrl: "https://api.avlytext.com"
      apiKey: ""
      senderId: "OMPlatform"
    orange:
      enabled: false
      baseUrl: "https://api.orange.com/sms"
      clientId: ""
      clientSecret: ""
      senderId: "OMPlatform"

  # Resources
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  # Autoscaling
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  # Use existing secret
  existingSecret: "sms-gateway-credentials"

# -----------------------------------------------------------------------------
# Service Account (shared)
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""

# -----------------------------------------------------------------------------
# Name overrides
# -----------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

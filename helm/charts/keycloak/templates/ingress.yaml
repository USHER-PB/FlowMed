{{- if and .Values.keycloak.enabled (.Values.keycloak.ingress).enabled }}
{{- $blockAdmin := .Values.keycloak.ingress.blockAdminUI | default false }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
  annotations:
    {{- if (.Values.keycloak.ingress.tls).enabled }}
    cert-manager.io/cluster-issuer: {{ (.Values.keycloak.ingress.tls).clusterIssuer | default "letsencrypt-prod" | quote }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    {{- end }}
    # Rate limit login endpoints to prevent brute force
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    {{- if $blockAdmin }}
    nginx.ingress.kubernetes.io/server-snippet: |
      location ~* ^/(admin|realms/master) {
        return 403;
      }
    {{- end }}
spec:
  ingressClassName: {{ .Values.keycloak.ingress.className | default "nginx" }}
  {{- if (.Values.keycloak.ingress.tls).enabled }}
  tls:
    - hosts:
        - {{ .Values.keycloak.ingress.host }}
      secretName: keycloak-tls
  {{- end }}
  rules:
    - host: {{ .Values.keycloak.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: {{ .Values.keycloak.port }}
{{- end }}

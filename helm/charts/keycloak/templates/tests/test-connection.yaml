apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-keycloak-test"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-keycloak
      image: busybox:1.36.1
      command: ['sh', '-c', 'wget -q --spider http://keycloak:8080/health/ready && echo "Keycloak OK"']

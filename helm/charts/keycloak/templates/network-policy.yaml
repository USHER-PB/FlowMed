{{- if .Values.networkPolicies.enabled }}
# Allow Keycloak to reach external SMTP servers for email delivery
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-keycloak-external
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: keycloak
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 587
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 25
        {{- if .Values.keycloak.keybound.enabled }}
        - protocol: TCP
          port: 443  # HTTPS egress for downloading keybound plugin JAR
        {{- end }}
---
# Allow Keycloak (8080 + 9000) from all pods in namespace + ingress controller
# Also allow Egress for DNS and PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: keycloak
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.global.namespace | default "fineract" }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.keycloak.port }}
        - protocol: TCP
          port: 9000
  egress:
    # Allow DNS resolution (kube-dns in kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow PostgreSQL connection to data-store namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.postgres.namespace | default "data-store" }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.port | default 5432 }}
{{- end }}

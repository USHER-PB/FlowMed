{{- if and .Values.keycloak.enabled .Values.keycloakConfig.enabled (eq .Values.secrets.mode "generate") }}
{{- $secretName := "keycloak-realm-credentials" }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-config
type: Opaque
stringData:
  {{- if $existingSecret }}
  # Preserve existing passwords on upgrade
  REALM_ADMIN_PASSWORD: {{ index $existingSecret.data "REALM_ADMIN_PASSWORD" | b64dec | quote }}
  MIFOS_PASSWORD: {{ index $existingSecret.data "MIFOS_PASSWORD" | b64dec | quote }}
  {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
  E2E_MOBILE_PASSWORD: {{ index $existingSecret.data "E2E_MOBILE_PASSWORD" | b64dec | quote }}
  E2E_KYC_PASSWORD: {{ index $existingSecret.data "E2E_KYC_PASSWORD" | b64dec | quote }}
  {{- end }}
  {{- else }}
  # Generate random passwords on first install
  # Note: Keycloak requires passwords with uppercase, lowercase, digits, and special characters
  # Prefixing with required character classes guarantees policy compliance.
  REALM_ADMIN_PASSWORD: {{ printf "Aa1!%s" (randAlphaNum 12) | quote }}
  MIFOS_PASSWORD: {{ printf "Bb2@%s" (randAlphaNum 12) | quote }}
  {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
  E2E_MOBILE_PASSWORD: {{ printf "Cc3#%s" (randAlphaNum 12) | quote }}
  E2E_KYC_PASSWORD: {{ printf "Dd4$%s" (randAlphaNum 12) | quote }}
  {{- end }}
  {{- end }}
{{- end }}

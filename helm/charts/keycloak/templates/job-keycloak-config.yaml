{{- if and .Values.keycloak.enabled .Values.keycloakConfig.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "keycloak.fullname" . }}-keycloak-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-config
  annotations:
    # ArgoCD: run as a Sync hook after Keycloak Deployment (wave 3) is healthy.
    # HookSucceeded cleans up after success so subsequent syncs do not see a
    # stale completed Job as "drifted". With idempotent import settings below
    # a re-run on the next sync is harmless, but using HookSucceeded combined
    # with ttlSecondsAfterFinished prevents ArgoCD from marking the infra app
    # Degraded when keycloak-config is absent between syncs.
    "argocd.argoproj.io/hook": Sync
    "argocd.argoproj.io/hook-delete-policy": HookSucceeded
    "argocd.argoproj.io/sync-wave": "4"
    # Helm hook for Docker Compose / helm install path (ArgoCD ignores this).
    # helm.sh/hook-weight must be > 10 so it runs after the keycloak deploy
    # and after any post-init jobs.
    "helm.sh/hook": "post-install,post-upgrade"
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded"
    checksum/realm: {{ .Files.Get "files/realm-fineract.yaml" | sha256sum }}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak-config
    spec:
      {{- include "keycloak.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-keycloak
          image: busybox:1.36.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              ATTEMPT=0
              MAX=60
              until [ $ATTEMPT -ge $MAX ]; do
                ATTEMPT=$((ATTEMPT + 1))
                if wget -q --spider http://keycloak:9000/health/ready 2>/dev/null; then
                  echo "Keycloak is ready (attempt $ATTEMPT)"
                  exit 0
                fi
                [ $((ATTEMPT % 12)) -eq 0 ] && echo "Still waiting for Keycloak... ${ATTEMPT}/${MAX}"
                sleep 5
              done
              echo "ERROR: Keycloak not ready after $((MAX * 5))s"
              exit 1
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: keycloak-config-cli
          image: "{{ .Values.keycloakConfig.image.repository }}:{{ .Values.keycloakConfig.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak:{{ .Values.keycloak.port }}"
            - name: KEYCLOAK_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.keycloak.secretName" . }}
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "keycloak.keycloak.secretName" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
              value: "true"
            - name: IMPORT_FILES_LOCATIONS
              value: "/config/*"
            - name: IMPORT_VAR_SUBSTITUTION_ENABLED
              value: "true"
            - name: IMPORT_CACHE_ENABLED
              value: "false"
            - name: IMPORT_FAIL_ON_ERROR
              value: "false"
            # Idempotency: tell keycloak-config-cli to update existing
            # sub-resources rather than fail with 409 Conflict on re-runs.
            # "no-delete" = create if absent, update if present, never remove.
            # This makes the job safe to re-run on every ArgoCD sync.
            - name: IMPORT_MANAGED_CLIENT
              value: "no-delete"
            - name: IMPORT_MANAGED_ROLE
              value: "no-delete"
            - name: IMPORT_MANAGED_GROUP
              value: "no-delete"
            - name: IMPORT_MANAGED_USER
              value: "no-delete"
            - name: IMPORT_MANAGED_REQUIRED_ACTION
              value: "no-delete"
            - name: IMPORT_MANAGED_SCOPE_MAPPING
              value: "no-delete"
            - name: IMPORT_MANAGED_IDENTITY_PROVIDER
              value: "no-delete"
            # Realm user passwords (always from keycloak-realm-credentials secret)
            - name: REALM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-realm-credentials
                  key: REALM_ADMIN_PASSWORD
            - name: MIFOS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-realm-credentials
                  key: MIFOS_PASSWORD
            {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
            # E2E test user passwords (dev only — from keycloak-realm-credentials secret)
            - name: E2E_MOBILE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-realm-credentials
                  key: E2E_MOBILE_PASSWORD
            - name: E2E_KYC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-realm-credentials
                  key: E2E_KYC_PASSWORD
            {{- end }}
            {{- if eq .Values.secrets.mode "existing" }}
            # Keycloak client secrets (only when using pre-created sealed secrets)
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-secret
            - name: ASSET_KC_SECRET
              valueFrom:
                secretKeyRef:
                  name: asset-service-credentials
                  key: keycloak-client-secret
            - name: PG_KC_SECRET
              valueFrom:
                secretKeyRef:
                  name: payment-gateway-credentials
                  key: keycloak-client-secret
            - name: CUSS_KC_SECRET
              valueFrom:
                secretKeyRef:
                  name: customer-self-service-credentials
                  key: keycloak-client-secret
            - name: USYNC_KC_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-sync-credentials
                  key: keycloak-client-secret
            - name: CONFIG_KC_SECRET
              valueFrom:
                secretKeyRef:
                  name: fineract-config-credentials
                  key: oauth2-client-secret
            - name: KYC_KC_SECRET
              valueFrom:
                secretKeyRef:
                  name: kyc-manager-credentials
                  key: keycloak-client-secret
            {{- end }}
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: realm-config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: realm-config
          configMap:
            name: {{ include "keycloak.fullname" . }}-keycloak-realm
        - name: tmp
          emptyDir: {}
{{- end }}

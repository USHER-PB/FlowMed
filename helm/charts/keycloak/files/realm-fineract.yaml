# =============================================================================
# Keycloak Realm Configuration for Docker Compose Local Development
# =============================================================================
# Derived from: operations/keycloak-config/base/config/realm-fineract.yaml
# Differences from K8s version:
#   - Uses HTTP localhost redirect URIs (no TLS for local dev)
#   - Client secrets use dev defaults from .env
#   - SMTP configured for Mailpit (local email testing)
#   - WebAuthn domain set to localhost
#   - Self-registration enabled with email-only + passkey flow
#   - Google social login configured
# =============================================================================

realm: fineract
displayName: Banking Platform
enabled: true
sslRequired: {{ .Values.keycloakConfig.sslRequired | default "none" }}

# Realm Settings
internationalizationEnabled: true
supportedLocales:
  - en
  - fr
  - sw
defaultLocale: en

# Login Settings
registrationAllowed: true
registrationEmailAsUsername: false
rememberMe: true
verifyEmail: {{ .Values.keycloakConfig.verifyEmail | default true }}
loginWithEmailAllowed: true
duplicateEmailsAllowed: false
resetPasswordAllowed: true
editUsernameAllowed: false

# Token Settings
accessTokenLifespan: {{ .Values.keycloakConfig.accessTokenLifespan | default 3600 }}
ssoSessionIdleTimeout: {{ .Values.keycloakConfig.ssoSessionIdleTimeout | default 86400 }}
ssoSessionMaxLifespan: {{ .Values.keycloakConfig.ssoSessionMaxLifespan | default 604800 }}
offlineSessionIdleTimeout: 2592000
revokeRefreshToken: true
refreshTokenMaxReuse: 0
accessCodeLifespan: 60
accessCodeLifespanUserAction: 300
accessCodeLifespanLogin: 1800

# Themes - loginTheme explicitly set to keycloak so admin/employee clients get the default theme.
# The webank login theme is applied per-client on self-service-app via login_theme attribute.
loginTheme: keycloak
emailTheme: webank
adminTheme: keycloak

# Security Defenses
bruteForceProtected: true
{{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
permanentLockout: false
maxFailureWaitSeconds: 1800
minimumQuickLoginWaitSeconds: 60
waitIncrementSeconds: 120
quickLoginCheckMilliSeconds: 500
maxDeltaTimeSeconds: 43200
failureFactor: 5
{{- else }}
# Production: stricter brute force protection
permanentLockout: false
maxFailureWaitSeconds: 3600
minimumQuickLoginWaitSeconds: 120
waitIncrementSeconds: 300
quickLoginCheckMilliSeconds: 1000
maxDeltaTimeSeconds: 43200
failureFactor: 3
{{- end }}

# Password Policy — strengthened for non-dev environments
{{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
passwordPolicy: "length(8)"
{{- else }}
passwordPolicy: "length(12) and digits and specialChars and upperCase and lowerCase and notUsername"
{{- end }}

# SMTP Configuration — defaults to Mailpit for local dev, override for production
smtpServer:
  host: "{{ .Values.keycloakConfig.smtp.host | default "mailpit" }}"
  port: "{{ .Values.keycloakConfig.smtp.port | default "1025" }}"
  from: "{{ .Values.keycloakConfig.smtp.from | default "noreply@webank.dev" }}"
  fromDisplayName: "{{ .Values.keycloakConfig.smtp.fromDisplayName | default "Webank" }}"
  replyTo: "{{ .Values.keycloakConfig.smtp.replyTo | default "support@webank.dev" }}"
  replyToDisplayName: "{{ .Values.keycloakConfig.smtp.replyToDisplayName | default "Webank Support" }}"
  ssl: "{{ .Values.keycloakConfig.smtp.ssl | default "false" }}"
  starttls: "{{ .Values.keycloakConfig.smtp.starttls | default "false" }}"
  auth: "{{ .Values.keycloakConfig.smtp.auth | default "false" }}"
  {{- if eq (.Values.keycloakConfig.smtp.auth | default "false" | toString) "true" }}
  user: "{{ .Values.keycloakConfig.smtp.user | default "" }}"
  password: "{{ .Values.keycloakConfig.smtp.password | default "" }}"
  {{- end }}

# Clients
clients:
  # 1. OAuth2 Proxy Client
  - clientId: "oauth2-proxy"
    name: Fineract OAuth2 Proxy
    description: OAuth2 Proxy - protects all web frontends with OIDC authentication
    enabled: true
    clientAuthenticatorType: client-secret
    secret: {{ if eq .Values.secrets.mode "existing" }}"$(env:OAUTH2_CLIENT_SECRET)"{{ else }}"oauth2-proxy-secret"{{ end }}
    protocol: openid-connect
    publicClient: false
    bearerOnly: false
    standardFlowEnabled: true
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    # Redirect URIs for OAuth2-Proxy
    {{- if .Values.keycloak.externalAppUrl }}
    rootUrl: "{{ .Values.keycloak.externalAppUrl }}"
    {{- else }}
    rootUrl: "http://localhost:4180"
    {{- end }}
    redirectUris:
      {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
      # Localhost URIs for local development only
      - "http://localhost:8080/oauth2/callback"
      - "http://localhost:8080/*"
      - "http://localhost:4180/oauth2/callback"
      - "http://localhost:4180/*"
      - "http://localhost:4200/*"
      - "http://localhost:4201/*"
      - "http://localhost:4202/*"
      - "http://localhost:4203/*"
      - "http://localhost:4204/*"
      - "http://localhost:4205/*"
      - "http://localhost:4206/*"
      - "http://localhost:4207/*"
      {{- end }}
      {{- if .Values.keycloak.externalAppUrl }}
      - "{{ .Values.keycloak.externalAppUrl }}/oauth2/callback"
      {{- end }}
    webOrigins:
      {{- if .Values.keycloak.externalAppUrl }}
      - "{{ .Values.keycloak.externalAppUrl }}"
      {{- end }}
      {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
      - "http://localhost:8080"
      - "http://localhost:4180"
      - "http://localhost:4200"
      - "http://localhost:4201"
      - "http://localhost:4202"
      - "http://localhost:4203"
      - "http://localhost:4204"
      - "http://localhost:4205"
      - "http://localhost:4206"
      - "http://localhost:4207"
      {{- end }}
    fullScopeAllowed: true
    defaultClientScopes:
      - profile
      - email
      - roles
      - web-origins
      - offline_access
    optionalClientScopes:
      - address
      - phone
    attributes:
      post.logout.redirect.uris: "{{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}http://localhost:8080/##http://localhost:8080/home/##http://localhost:4180/##http://localhost:4200/##http://localhost:4201/{{- end }}{{- if .Values.keycloak.externalAppUrl }}{{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}##{{- end }}{{ .Values.keycloak.externalAppUrl }}/*##{{ .Values.keycloak.externalAppUrl }}/##{{ .Values.keycloak.externalAppUrl }}/home/{{- end }}"
      backchannel.logout.session.required: "true"
      backchannel.logout.revoke.offline.tokens: "true"
    protocolMappers:
      - name: fineract-user-id-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "fineract_user_id"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "fineract_user_id"
          jsonType.label: "String"
      - name: office-id-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "office_id"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "office_id"
          jsonType.label: "String"
      - name: employee-id-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "employee_id"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "employee_id"
          jsonType.label: "String"
      - name: tenant-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "tenant"
          claim.value: "default"
          jsonType.label: "String"
      - name: audience-mapper
        protocol: openid-connect
        protocolMapper: oidc-audience-mapper
        consentRequired: false
        config:
          included.client.audience: "oauth2-proxy"
          id.token.claim: "false"
          access.token.claim: "true"
      - name: username-in-sub
        protocol: openid-connect
        protocolMapper: oidc-usermodel-property-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "username"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "sub"
          jsonType.label: "String"
      - name: realm-roles
        protocol: openid-connect
        protocolMapper: oidc-usermodel-realm-role-mapper
        consentRequired: false
        config:
          claim.name: "realm_access.roles"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
          multivalued: "true"

  # admin-cli is a Keycloak built-in client — do NOT define it here.
  # Defining it causes 400 errors on fresh DB imports because Keycloak
  # auto-creates it during bootstrap and keycloak-config-cli cannot
  # re-create a built-in client via the API.

  # 2. Fineract Data Loader
  - clientId: fineract-data-loader
    name: Fineract Data Loader Service
    description: Service account for automated data loading jobs
    enabled: true
    publicClient: false
    clientAuthenticatorType: client-secret
    secret: {{ if eq .Values.secrets.mode "existing" }}"$(env:CONFIG_KC_SECRET)"{{ else }}"fineract-data-loader-secret"{{ end }}
    protocol: openid-connect
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    defaultClientScopes:
      - profile
      - email
      - roles
    protocolMappers:
      - name: tenant-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "tenant"
          claim.value: "default"
          jsonType.label: "String"
      - name: mifos-sub-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "sub"
          claim.value: "mifos"
          jsonType.label: "String"

  # 4. Asset Service (backend → Fineract API calls)
  - clientId: "asset-service"
    name: Asset Service
    description: Service account for asset service to call Fineract API
    enabled: true
    publicClient: false
    clientAuthenticatorType: client-secret
    secret: {{ if eq .Values.secrets.mode "existing" }}"$(env:ASSET_KC_SECRET)"{{ else }}"asset-service-secret"{{ end }}
    protocol: openid-connect
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    defaultClientScopes:
      - profile
      - email
      - roles
    protocolMappers:
      - name: tenant-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "tenant"
          claim.value: "default"
          jsonType.label: "String"
      - name: mifos-sub-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "sub"
          claim.value: "mifos"
          jsonType.label: "String"

  # 5. User Sync Service
  - clientId: "user-sync-service"
    name: User Sync Service
    description: Service account for user synchronization between Fineract and Keycloak
    enabled: true
    publicClient: false
    clientAuthenticatorType: client-secret
    secret: {{ if eq .Values.secrets.mode "existing" }}"$(env:USYNC_KC_SECRET)"{{ else }}"user-sync-service-secret"{{ end }}
    protocol: openid-connect
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    defaultClientScopes:
      - profile
      - email
      - roles

  # 6. Payment Gateway (mobile money integrations)
  - clientId: "payment-gateway"
    name: Payment Gateway Service
    description: Service account for payment gateway operations
    enabled: true
    publicClient: false
    clientAuthenticatorType: client-secret
    secret: {{ if eq .Values.secrets.mode "existing" }}"$(env:PG_KC_SECRET)"{{ else }}"payment-gateway-secret"{{ end }}
    protocol: openid-connect
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    defaultClientScopes:
      - profile
      - email
      - roles
    protocolMappers:
      - name: tenant-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          introspection.token.claim: "true"
          claim.name: "tenant"
          claim.value: "default"
          jsonType.label: "String"
      - name: mifos-sub-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        consentRequired: false
        config:
          claim.name: "sub"
          claim.value: "mifos"
          jsonType.label: "String"
          access.token.claim: "true"
          id.token.claim: "true"
          userinfo.token.claim: "true"
          introspection.token.claim: "true"

  # 7. Customer Registration (Customer Self-Service backend)
  - clientId: "customer-registration"
    name: Customer Registration Service
    description: Service account for customer self-service registration
    enabled: true
    publicClient: false
    clientAuthenticatorType: client-secret
    secret: {{ if eq .Values.secrets.mode "existing" }}"$(env:CUSS_KC_SECRET)"{{ else }}"customer-registration-secret"{{ end }}
    protocol: openid-connect
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    defaultClientScopes:
      - profile
      - email
      - roles
    protocolMappers:
      - name: tenant-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        config:
          claim.name: "tenant"
          claim.value: "default"
          jsonType.label: "String"
          access.token.claim: "true"
          id.token.claim: "true"
          userinfo.token.claim: "true"
          introspection.token.claim: "true"
      - name: mifos-sub-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        config:
          claim.name: "sub"
          claim.value: "mifos"
          jsonType.label: "String"
          access.token.claim: "true"
          id.token.claim: "true"
          userinfo.token.claim: "true"
          introspection.token.claim: "true"

  # 8. Self-Service App (Public SPA with PKCE)
  - clientId: "self-service-app"
    name: Self-Service Banking Portal
    description: Customer self-service portal with passwordless authentication
    enabled: true
    publicClient: true
    clientAuthenticatorType: client-secret
    protocol: openid-connect
    standardFlowEnabled: true
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    {{- if .Values.keycloak.externalAppUrl }}
    rootUrl: "{{ .Values.keycloak.externalAppUrl }}/self-service"
    {{- else }}
    rootUrl: "http://localhost:4201"
    {{- end }}
    redirectUris:
      {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
      - "http://localhost:4201/callback"
      - "http://localhost:4201/*"
      - "http://localhost:3000/callback"
      - "http://localhost:3000/*"
      - "http://localhost:8080/self-service/callback"
      - "http://localhost:8080/self-service/*"
      {{- end }}
      {{- if .Values.keycloak.externalAppUrl }}
      - "{{ .Values.keycloak.externalAppUrl }}/self-service/callback"
      {{- end }}
    webOrigins:
      {{- if .Values.keycloak.externalAppUrl }}
      - "{{ .Values.keycloak.externalAppUrl }}"
      {{- end }}
      {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
      - "http://localhost:4201"
      - "http://localhost:3000"
      - "http://localhost:8080"
      {{- end }}
    fullScopeAllowed: false
    defaultClientScopes:
      - profile
      - email
      - offline_access
    optionalClientScopes:
      - address
      - phone
    attributes:
      post.logout.redirect.uris: "{{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}http://localhost:4201/##http://localhost:4201/*##http://localhost:3000/##http://localhost:3000/*##http://localhost:8080/self-service/##http://localhost:8080/self-service/*{{- end }}{{- if .Values.keycloak.externalAppUrl }}{{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}##{{- end }}{{ .Values.keycloak.externalAppUrl }}/self-service/##{{ .Values.keycloak.externalAppUrl }}/self-service/*{{- end }}"
      pkce.code.challenge.method: "S256"
      login_theme: "webank"
    authenticationFlowBindingOverrides:
      browser: self-service-browser
    protocolMappers:
      - name: fineract-external-id-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "fineract_external_id"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "fineract_external_id"
          jsonType.label: "String"
      - name: fineract-client-id-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "fineract_client_id"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "fineract_client_id"
          jsonType.label: "long"
      - name: kyc-tier-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "kyc_tier"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "kyc_tier"
          jsonType.label: "String"
      - name: kyc-status-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "kyc_status"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "kyc_status"
          jsonType.label: "String"
      - name: tenant-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "tenant"
          claim.value: "default"
          jsonType.label: "String"
      - name: realm-roles
        protocol: openid-connect
        protocolMapper: oidc-usermodel-realm-role-mapper
        consentRequired: false
        config:
          claim.name: "realm_access.roles"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
          multivalued: "true"

  # 9. KYC Manager (Next.js server-rendered app — staff KYC review)
  - clientId: "kyc-manager"
    name: KYC Manager
    description: Staff-facing KYC review application (confidential, server-side auth)
    enabled: true
    publicClient: false
    clientAuthenticatorType: client-secret
    secret: {{ if eq .Values.secrets.mode "existing" }}"$(env:KYC_KC_SECRET)"{{ else }}"kyc-manager-secret"{{ end }}
    protocol: openid-connect
    standardFlowEnabled: true
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    {{- if .Values.keycloak.externalKycUrl }}
    rootUrl: "{{ .Values.keycloak.externalKycUrl }}"
    {{- else if .Values.keycloak.externalAppUrl }}
    rootUrl: "{{ .Values.keycloak.externalAppUrl }}/kyc-manager"
    {{- else }}
    rootUrl: "http://localhost:3000"
    {{- end }}
    redirectUris:
      {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
      - "http://localhost:3000/*"
      - "http://localhost:3000/api/auth/callback/keycloak"
      - "http://localhost:8080/kyc-manager/*"
      - "http://localhost:8080/kyc-manager/api/auth/callback/keycloak"
      {{- end }}
      {{- if .Values.keycloak.externalKycUrl }}
      - "{{ .Values.keycloak.externalKycUrl }}/*"
      - "{{ .Values.keycloak.externalKycUrl }}/api/auth/callback/keycloak"
      {{- end }}
      {{- if .Values.keycloak.externalAppUrl }}
      - "{{ .Values.keycloak.externalAppUrl }}/kyc-manager/*"
      - "{{ .Values.keycloak.externalAppUrl }}/kyc-manager/api/auth/callback/keycloak"
      {{- end }}
    webOrigins:
      {{- if .Values.keycloak.externalKycUrl }}
      - "{{ .Values.keycloak.externalKycUrl }}"
      {{- end }}
      {{- if .Values.keycloak.externalAppUrl }}
      - "{{ .Values.keycloak.externalAppUrl }}"
      {{- end }}
      {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
      - "http://localhost:3000"
      - "http://localhost:8080"
      {{- end }}
    fullScopeAllowed: true
    defaultClientScopes:
      - basic
      - profile
      - email
      - roles
      - web-origins
      - acr
    attributes:
      post.logout.redirect.uris: "{{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}http://localhost:3000/*##http://localhost:8080/kyc-manager/*{{- end }}{{- if .Values.keycloak.externalKycUrl }}{{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}##{{- end }}{{ .Values.keycloak.externalKycUrl }}/*{{- end }}{{- if .Values.keycloak.externalAppUrl }}##{{ .Values.keycloak.externalAppUrl }}/kyc-manager/*{{- end }}"
    protocolMappers:
      - name: fineract-external-id-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "fineract_external_id"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "fineract_external_id"
          jsonType.label: "String"
      - name: fineract-client-id-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "fineract_client_id"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "fineract_client_id"
          jsonType.label: "long"
      - name: kyc-tier-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "kyc_tier"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "kyc_tier"
          jsonType.label: "String"
      - name: kyc-status-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "kyc_status"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "kyc_status"
          jsonType.label: "String"
      - name: tenant-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "tenant"
          claim.value: "default"
          jsonType.label: "String"
      - name: realm-roles
        protocol: openid-connect
        protocolMapper: oidc-usermodel-realm-role-mapper
        consentRequired: false
        config:
          claim.name: "realm_access.roles"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
          multivalued: "true"
      - name: resource-server-audience
        protocol: openid-connect
        protocolMapper: oidc-audience-mapper
        consentRequired: false
        config:
          included.client.audience: "resource-server"
          id.token.claim: "false"
          access.token.claim: "true"

  {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
  # 10. Demo Script Client (dev only — password-grant for automated demo/test scripts)
  # WARNING: directAccessGrantsEnabled (password grant) is a security risk in production.
  # This client allows username/password login via API, bypassing browser-based auth flows.
  - clientId: "demo-script"
    name: Demo Script Client
    description: Client for automated demo/test scripts with password grant
    enabled: true
    publicClient: true
    clientAuthenticatorType: client-secret
    protocol: openid-connect
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: true
    serviceAccountsEnabled: false
    fullScopeAllowed: true
    defaultClientScopes:
      - basic
      - profile
      - email
      - roles
      - web-origins
      - acr
    protocolMappers:
      - name: fineract-client-id-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "fineract_client_id"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "fineract_client_id"
          jsonType.label: "long"
      - name: fineract-external-id-mapper
        protocol: openid-connect
        protocolMapper: oidc-usermodel-attribute-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          user.attribute: "fineract_external_id"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "fineract_external_id"
          jsonType.label: "String"
      - name: tenant-mapper
        protocol: openid-connect
        protocolMapper: oidc-hardcoded-claim-mapper
        consentRequired: false
        config:
          userinfo.token.claim: "true"
          id.token.claim: "true"
          access.token.claim: "true"
          claim.name: "tenant"
          claim.value: "default"
          jsonType.label: "String"
      - name: realm-roles
        protocol: openid-connect
        protocolMapper: oidc-usermodel-realm-role-mapper
        consentRequired: false
        config:
          claim.name: "realm_access.roles"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
          multivalued: "true"
      # Maps realm roles to a "groups" claim for OAuth2-Proxy
      # OAuth2-Proxy reads this claim directly (no "role:" prefix)
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-usermodel-realm-role-mapper
        consentRequired: false
        config:
          claim.name: "groups"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
          multivalued: "true"
  {{- end }}

  # 11. Web Mobile Client (Azamra mobile frontend)
  - clientId: "web-mobile"
    name: Azamra Mobile App
    description: Public OAuth2 client for the Azamra mobile frontend (passkey/device-key auth)
    enabled: true
    protocol: openid-connect
    publicClient: true
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    fullScopeAllowed: true
    {{- if .Values.keycloak.externalMobileUrl }}
    rootUrl: "{{ .Values.keycloak.externalMobileUrl }}"
    {{- end }}
    redirectUris:
      {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
      - "http://localhost:8081/*"
      {{- end }}
      {{- if .Values.keycloak.externalMobileUrl }}
      - "{{ .Values.keycloak.externalMobileUrl }}/*"
      {{- end }}
    webOrigins:
      {{- if .Values.keycloak.externalMobileUrl }}
      - "{{ .Values.keycloak.externalMobileUrl }}"
      {{- end }}
      {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
      - "http://localhost:8081"
      {{- end }}
    defaultClientScopes:
      - basic
      - profile
      - email
      - roles
      - web-origins
      - acr

  # 12. Resource Server Client (user-storage backend — server-to-server auth)
  - clientId: "resource-server"
    name: Keybound Resource Server
    description: Confidential client for user-storage backend service accounts and authorization
    enabled: true
    protocol: openid-connect
    publicClient: false
    serviceAccountsEnabled: true
    authorizationServicesEnabled: true
    clientAuthenticatorType: client-secret
    secret: "resource-server-secret"
    directAccessGrantsEnabled: false
    standardFlowEnabled: false
    redirectUris: []
    defaultClientScopes:
      - basic
      - profile
      - email
      - roles
      - web-origins

# Realm Roles
roles:
  realm:
    - name: admin
      description: Full administrative access
    - name: Admin
      description: Admin role (capitalized for frontend apps)
    - name: Super User
      description: Full administrative access (Fineract native role name)
    - name: staff
      description: Generic staff member with operational access
    - name: loan-officer
      description: Loan officer - create and manage loans, clients
    - name: teller
      description: Teller/cashier - cash transactions
    - name: accountant
      description: Accountant - financial reports
    - name: Accountant
      description: Accountant role (capitalized for frontend apps)
    - name: Supervisor Accountant
      description: Supervisor Accountant
    - name: Manager
      description: Manager role
    - name: Viewer
      description: Viewer role - read-only access
    # Lowercase kebab-case aliases for frontend apps
    # Frontend apps expect these exact role names from OAuth2-Proxy groups claim
    - name: super-user
      description: Alias for "Super User" - used by frontend apps
      composite: true
      composites:
        realm:
          - Super User
    - name: supervisor-accountant
      description: Alias for "Supervisor Accountant" - used by frontend apps
      composite: true
      composites:
        realm:
          - Supervisor Accountant
    - name: manager
      description: Alias for "Manager" - used by frontend apps
      composite: true
      composites:
        realm:
          - Manager
    - name: viewer
      description: Alias for "Viewer" - used by frontend apps
      composite: true
      composites:
        realm:
          - Viewer
    - name: branch-manager
      description: Branch manager
      composite: true
      composites:
        realm:
          - loan-officer
          - staff
    - name: ASSET_MANAGER
      description: Asset service administrator - create and manage digital assets
    - name: KYC_MANAGER
      description: KYC manager - review and approve customer KYC submissions
    - name: kyc-manager
      description: Alias for "KYC_MANAGER" - used by frontend apps
      composite: true
      composites:
        realm:
          - KYC_MANAGER
    - name: field-officer
      description: Field officer
    - name: operations-manager
      description: Operations manager
      composite: true
      composites:
        realm:
          - branch-manager
          - staff
    - name: credit-committee
      description: Credit committee member
    - name: checker
      description: Maker-checker approval workflows
    - name: client
      description: Client/customer
    - name: readonly
      description: Read-only access
    - name: self-service-customer
      description: Self-service banking customer
    - name: self-service-deposit
      description: Can perform deposits via self-service
    - name: self-service-withdrawal
      description: Can perform withdrawals via self-service

# Groups
groups:
  - name: head-office
    path: /head-office
    attributes:
      office_id: ["1"]
    realmRoles:
      - admin
      - staff
  - name: branch-managers
    path: /branch-managers
    realmRoles:
      - branch-manager
      - staff
  - name: loan-officers
    path: /loan-officers
    realmRoles:
      - loan-officer
      - staff
  - name: tellers
    path: /tellers
    realmRoles:
      - teller
      - staff
  - name: clients
    path: /clients
    realmRoles:
      - client
  - name: self-service-customers
    path: /self-service-customers
    realmRoles:
      - self-service-customer
      - self-service-deposit
      - self-service-withdrawal
    attributes:
      registration_allowed: ["true"]
      kyc_tier_default: ["1"]

# Authentication Flows
authenticationFlows:
  - alias: self-service-browser
    description: Passwordless browser flow for self-service customers
    providerId: basic-flow
    topLevel: true
    builtIn: false
    authenticationExecutions:
      - authenticator: auth-cookie
        authenticatorFlow: false
        requirement: ALTERNATIVE
        priority: 10
      - flowAlias: self-service-passwordless-forms
        authenticatorFlow: true
        requirement: ALTERNATIVE
        priority: 20

  - alias: self-service-passwordless-forms
    description: Username form followed by 2FA authentication
    providerId: basic-flow
    topLevel: false
    builtIn: false
    authenticationExecutions:
      - authenticator: auth-username-form
        authenticatorFlow: false
        requirement: REQUIRED
        priority: 10
      - flowAlias: self-service-2fa-options
        authenticatorFlow: true
        requirement: REQUIRED
        priority: 20

  - alias: self-service-2fa-options
    description: WebAuthn (primary), OTP (backup), or password (recovery)
    providerId: basic-flow
    topLevel: false
    builtIn: false
    authenticationExecutions:
      - authenticator: webauthn-authenticator-passwordless
        authenticatorFlow: false
        requirement: ALTERNATIVE
        priority: 10
      - authenticator: auth-otp-form
        authenticatorFlow: false
        requirement: ALTERNATIVE
        priority: 20
      - authenticator: auth-password-form
        authenticatorFlow: false
        requirement: ALTERNATIVE
        priority: 30

# Required Actions
# webauthn-register-passwordless is available but not a default required action
# VERIFY_EMAIL is available but not a default action (Google verifies email; passkey is strong auth)
requiredActions:
  - alias: VERIFY_EMAIL
    name: Verify Email
    providerId: VERIFY_EMAIL
    enabled: true
    defaultAction: false
    priority: 10
  - alias: webauthn-register-passwordless
    name: Webauthn Register Passwordless
    providerId: webauthn-register-passwordless
    enabled: true
    defaultAction: false
    priority: 20
  - alias: UPDATE_PASSWORD
    name: Update Password
    providerId: UPDATE_PASSWORD
    enabled: true
    defaultAction: false
    priority: 30
  - alias: CONFIGURE_TOTP
    name: Configure OTP
    providerId: CONFIGURE_TOTP
    enabled: true
    defaultAction: false
    priority: 40

# Service Account Users - Role Assignments
users:
  # User Sync Service Account
  - username: service-account-user-sync-service
    enabled: true
    serviceAccountClientId: "user-sync-service"
    clientRoles:
      realm-management:
        - manage-users
        - view-users
        - query-users
        - view-realm

  # Fineract Data Loader Service Account - needs ASSET_MANAGER for asset admin API
  - username: service-account-fineract-data-loader
    enabled: true
    serviceAccountClientId: "fineract-data-loader"
    realmRoles:
      - ASSET_MANAGER

  # Customer Registration Service Account - needs admin for Fineract API + KYC_MANAGER
  - username: service-account-customer-registration
    enabled: true
    serviceAccountClientId: "customer-registration"
    realmRoles:
      - KYC_MANAGER
      - admin

  # Payment Gateway Service Account - needs admin for Fineract financial APIs (deposits/withdrawals)
  - username: service-account-payment-gateway
    enabled: true
    serviceAccountClientId: "payment-gateway"
    realmRoles:
      - admin

  # Admin user (realm admin - Keycloak management only)
  - username: admin
    enabled: true
    emailVerified: true
    firstName: System
    lastName: Administrator
    email: admin@fineract.dev
    credentials:
      - type: password
        userLabel: "initial"
        {{- if eq (.Values.secrets.mode | default "generate") "existing" }}
        value: "$(env:REALM_ADMIN_PASSWORD)"
        {{- else }}
        value: {{ .Values.keycloakConfig.realmUsers.adminPassword | default "admin1234" | quote }}
        {{- end }}
        temporary: false
    realmRoles:
      - Admin
      - Super User
      - Accountant
      - super-user
      - accountant
      - supervisor-accountant
      - manager
      - ASSET_MANAGER
      - KYC_MANAGER
    groups:
      - /head-office
    attributes:
      employee_id: ["EMP001"]
      office_id: ["1"]

  # Mifos user (Fineract super admin - backend services impersonate this user via sub=mifos)
  # WARNING: "mifos" is a well-known default in the Fineract ecosystem.
  # For production: set a strong password via keycloakConfig.realmUsers.mifosPassword
  # and temporary=true to force password change on first login.
  - username: mifos
    enabled: true
    emailVerified: true
    firstName: Mifos
    lastName: User
    email: mifos@fineract.dev
    credentials:
      - type: password
        userLabel: "initial"
        {{- if eq (.Values.secrets.mode | default "generate") "existing" }}
        value: "$(env:MIFOS_PASSWORD)"
        {{- else }}
        value: {{ .Values.keycloakConfig.realmUsers.mifosPassword | default "password" | quote }}
        {{- end }}
        temporary: false
    realmRoles:
      - Admin
      - Super User
      - Accountant
      - super-user
      - accountant
      - supervisor-accountant
      - manager
      - ASSET_MANAGER
      - KYC_MANAGER
    groups:
      - /head-office
    attributes:
      employee_id: ["EMP002"]
      office_id: ["1"]

  {{- if eq (.Values.keycloakConfig.environment | default "dev") "dev" }}
  # Demo user (dev environment only)
  - username: demo
    enabled: true
    emailVerified: true
    firstName: Demo
    lastName: User
    email: demo@fineract.dev
    credentials:
      - type: password
        userLabel: "initial"
        value: "password"
        temporary: false
    realmRoles:
      - Admin
      - Super User
      - Accountant
      - super-user
      - accountant
      - supervisor-accountant
      - manager
      - ASSET_MANAGER
      - KYC_MANAGER
    groups:
      - /head-office
    attributes:
      employee_id: ["EMP003"]
      office_id: ["1"]

  # KYC Admin demo user (dev environment only)
  - username: kyc-admin
    enabled: true
    emailVerified: true
    firstName: KYC
    lastName: Admin
    email: kyc-admin@fineract.dev
    credentials:
      - type: password
        userLabel: "initial"
        value: {{ .Values.keycloakConfig.realmUsers.kycAdminPassword | default "password" | quote }}
        temporary: false
    realmRoles:
      - KYC_MANAGER
      - staff
    groups:
      - /head-office
    attributes:
      employee_id: ["EMP004"]
      office_id: ["1"]

  # E2E test users (dev environment only — never provisioned in UAT or prod)
  - username: e2e-test
    enabled: true
    emailVerified: true
    firstName: E2E
    lastName: Mobile
    email: e2e-test@azamra.capital
    credentials:
      - type: password
        userLabel: "initial"
        value: "$(env:E2E_MOBILE_PASSWORD)"
        temporary: false

  - username: e2e-staff
    enabled: true
    emailVerified: true
    firstName: E2E
    lastName: Staff
    email: e2e-staff@azamra.capital
    credentials:
      - type: password
        userLabel: "initial"
        value: "$(env:E2E_KYC_PASSWORD)"
        temporary: false
    realmRoles:
      - KYC_MANAGER
      - staff
    groups:
      - /head-office
  {{- end }}

# Google Identity Provider (Social Login)
identityProviders:
  - alias: google
    displayName: "Google"
    providerId: google
    enabled: true
    trustEmail: true
    storeToken: false
    addReadTokenRoleOnCreate: false
    authenticateByDefault: false
    linkOnly: false
    firstBrokerLoginFlowAlias: "first broker login"
    config:
      clientId: "${GOOGLE_CLIENT_ID}"
      clientSecret: "${GOOGLE_CLIENT_SECRET}"
      defaultScope: "openid email profile"
      syncMode: "IMPORT"
      guiOrder: "1"
      hideOnLoginPage: "true"

identityProviderMappers:
  - name: google-group-mapper
    identityProviderAlias: google
    identityProviderMapper: hardcoded-group-idp-mapper
    config:
      syncMode: "IMPORT"
      group: "/self-service-customers"

# Attributes
attributes:
  frontendUrl: "{{ .Values.keycloak.hostnameUrl | default "http://localhost:8180" }}"
  userProfileEnabled: "true"
  unmanagedAttributePolicy: "ENABLED"
  webAuthnPolicyRpEntityName: "Webank"
  webAuthnPolicyRpId: "{{ (urlParse (.Values.keycloak.externalAppUrl | default "http://localhost")).host | default "localhost" }}"
  webAuthnPolicySignatureAlgorithms: '["ES256","RS256"]'
  webAuthnPolicyAttestationConveyancePreference: "none"
  webAuthnPolicyAuthenticatorAttachment: "cross-platform,platform"
  webAuthnPolicyRequireResidentKey: "Yes"
  webAuthnPolicyUserVerificationRequirement: "required"
  webAuthnPolicyPasswordlessRpEntityName: "Webank"
  webAuthnPolicyPasswordlessRpId: "{{ (urlParse (.Values.keycloak.externalAppUrl | default "http://localhost")).host | default "localhost" }}"
  webAuthnPolicyPasswordlessSignatureAlgorithms: '["ES256","RS256"]'
  webAuthnPolicyPasswordlessAttestationConveyancePreference: "none"
  webAuthnPolicyPasswordlessAuthenticatorAttachment: "cross-platform,platform"
  webAuthnPolicyPasswordlessRequireResidentKey: "Yes"
  webAuthnPolicyPasswordlessUserVerificationRequirement: "required"

# Components — User Storage Provider (Keybound backend)
{{- if .Values.keycloak.keybound.enabled }}
components:
  org.keycloak.storage.UserStorageProvider:
    - id: backend-user-storage
      name: backend-user-storage
      providerId: backend-user-storage
      config:
        enabled:
          - "true"
        priority:
          - "0"
        cachePolicy:
          - "DEFAULT"
{{- end }}

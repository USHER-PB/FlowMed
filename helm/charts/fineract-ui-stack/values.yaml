# =============================================================================
# Fineract UI Stack Helm Chart - Default Values
# =============================================================================
# This chart deploys 10 UI applications for Apache Fineract.
# Each application can be individually enabled/disabled.
# =============================================================================

# =============================================================================
# Global Configuration
# =============================================================================

global:
  domain: example.com
  apiEndpoint: https://api.fineract.example.com
  keycloak:
    url: https://keycloak.example.com
    realm: fineract

# =============================================================================
# Common UI Configuration
# =============================================================================

ui:
  image:
    repository: nginx
    tag: "1.25-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  replicaCount: 2

# =============================================================================
# Portal Application
# =============================================================================

portal:
  enabled: true
  replicaCount: 2
  image:
    repository: fineract/portal-ui
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  hostname: portal.fineract.example.com
  keycloak:
    clientId: fineract-portal
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  ingress:
    enabled: true
    clusterIssuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: portal-tls

# =============================================================================
# Web App Application
# =============================================================================

webApp:
  enabled: false
  image:
    repository: fineract/web-app-ui
    tag: "1.0.0"
  hostname: app.fineract.example.com
  keycloak:

{{/*
 =============================================================================
 Portal Deployment Template
 =============================================================================
 Deployment for Portal UI application (NGINX serving static files)
 Requirements: 7.2, 7.5, 8.5, 12.6, 13.6
 =============================================================================
 */}}
{{- if .Values.portal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fineract-ui-stack.fullname" . }}-portal
  labels:
    {{- include "fineract-ui-stack.appLabels" (dict "root" . "appName" "portal") | nindent 4 }}
spec:
  replicas: {{ .Values.portal.replicaCount | default .Values.ui.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "fineract-ui-stack.appSelectorLabels" (dict "root" . "appName" "portal") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fineract-ui-stack.appSelectorLabels" (dict "root" . "appName" "portal") | nindent 8 }}
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: portal
          image: "{{ .Values.portal.image.repository }}:{{ .Values.portal.image.tag | default .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.portal.image.pullPolicy | default .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.portal.resources.requests.cpu | default .Values.ui.resources.requests.cpu }}
              memory: {{ .Values.portal.resources.requests.memory | default .Values.ui.resources.requests.memory }}
            limits:
              cpu: {{ .Values.portal.resources.limits.cpu | default .Values.ui.resources.limits.cpu }}
              memory: {{ .Values.portal.resources.limits.memory | default .Values.ui.resources.limits.memory }}
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
            - name: content
              mountPath: /usr/share/nginx/html/styles.css
              subPath: styles.css
              readOnly: true
            - name: content
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: content
          configMap:
            name: {{ include "fineract-ui-stack.fullname" . }}-portal-content
{{- end }}

{{/*
  =============================================================================
  Portal ConfigMap Template
  =============================================================================
  ConfigMap containing custom content for Portal landing page
  Requirements: 8.1, 8.2, 8.3, 8.4, 8.6
  =============================================================================
  */}}
{{- if .Values.portal.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fineract-ui-stack.fullname" . }}-portal-content
  labels:
    {{- include "fineract-ui-stack.appLabels" (dict "root" . "appName" "portal") | nindent 4 }}
data:
  index.html: |
{{ .Files.Get "files/portal-app/index.html" | indent 4 }}
  styles.css: |
{{ .Files.Get "files/portal-app/styles.css" | indent 4 }}
  default.conf: |
{{ .Files.Get "files/portal-app/portal-app.conf" | indent 4 }}
{{- end }}

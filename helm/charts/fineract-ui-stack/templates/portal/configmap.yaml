{{/*
=============================================================================
Portal ConfigMap Template
=============================================================================
ConfigMap containing config.json for Portal UI application
Requirements: 8.1, 8.2, 8.3, 8.4, 8.6
=============================================================================
*/}}
{{- if .Values.portal.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fineract-ui-stack.fullname" . }}-portal-config
  labels:
    {{- include "fineract-ui-stack.appLabels" (dict "root" . "appName" "portal") | nindent 4 }}
data:
  config.json: |
    {
      "apiEndpoint": "{{ .Values.global.apiEndpoint }}",
      "keycloak": {
        "url": "{{ .Values.global.keycloak.url }}",
        "realm": "{{ .Values.global.keycloak.realm }}",
        "clientId": "{{ .Values.portal.keycloak.clientId }}",
        "redirectUri": "https://{{ .Values.portal.hostname }}"
      }
    }
{{- end }}

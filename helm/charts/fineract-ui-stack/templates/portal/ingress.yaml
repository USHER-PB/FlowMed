{{/*
=============================================================================
Portal Ingress Template
=============================================================================
Ingress for Portal UI application with TLS and cert-manager
Requirements: 7.4, 9.1, 9.2, 9.3, 9.4, 9.5
=============================================================================
*/}}
{{- if and .Values.portal.enabled .Values.portal.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fineract-ui-stack.fullname" . }}-portal
  labels:
    {{- include "fineract-ui-stack.appLabels" (dict "root" . "appName" "portal") | nindent 4 }}
  annotations:
    {{- if and .Values.portal.tls.enabled .Values.portal.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.portal.ingress.clusterIssuer }}
    {{- end }}
    {{- if .Values.portal.ingress.annotations }}
    {{- toYaml .Values.portal.ingress.annotations | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: nginx
  {{- if .Values.portal.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.portal.hostname }}
      secretName: {{ .Values.portal.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.portal.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "fineract-ui-stack.fullname" . }}-portal
                port:
                  number: 80
{{- end }}

{{/*
 =============================================================================
 Asset Ingress Template
 =============================================================================
 Ingress for Asset UI application with TLS and cert-manager
 Requirements: 7.4, 9.1, 9.2, 9.3, 9.4, 9.5
 =============================================================================
 */}}
{{- if and .Values.asset.enabled .Values.asset.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fineract-ui-stack.fullname" . }}-asset
  labels:
    {{- include "fineract-ui-stack.appLabels" (dict "root" . "appName" "asset") | nindent 4 }}
  annotations:
    {{- if and .Values.asset.tls.enabled .Values.asset.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.asset.ingress.clusterIssuer }}
    {{- end }}
    {{- if .Values.asset.ingress.annotations }}
    {{- toYaml .Values.asset.ingress.annotations | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.asset.ingress.className | default "nginx" }}
  {{- if .Values.asset.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.asset.hostname }}
      secretName: {{ .Values.asset.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.asset.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "fineract-ui-stack.fullname" . }}-asset
                port:
                  number: 80
{{- end }}

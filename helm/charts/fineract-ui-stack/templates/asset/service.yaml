{{/*
 =============================================================================
 Asset Service Template
 =============================================================================
 ClusterIP service for Asset UI application
 Requirements: 7.3
 =============================================================================
 */}}
{{- if .Values.asset.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fineract-ui-stack.fullname" . }}-asset
  labels:
    {{- include "fineract-ui-stack.appLabels" (dict "root" . "appName" "asset") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "fineract-ui-stack.appSelectorLabels" (dict "root" . "appName" "asset") | nindent 4 }}
{{- end }}

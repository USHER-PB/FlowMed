{{/*
  =============================================================================
  Asset ConfigMap Template
  =============================================================================
  ConfigMap containing nginx config for Asset UI application
  Requirements: 8.1, 8.2, 8.3, 8.4, 8.6
  =============================================================================
  */}}
{{- if .Values.asset.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fineract-ui-stack.fullname" . }}-asset-nginx
  labels:
    {{- include "fineract-ui-stack.appLabels" (dict "root" . "appName" "asset") | nindent 4 }}
data:
  default.conf: |
{{ .Files.Get "files/asset-manager-default.conf" | replace "KUBE_DNS_RESOLVER" (.Values.global.dnsResolver | default "10.96.0.10") | indent 4 }}
{{- end }}

{{/*
 =============================================================================
 Reporting ConfigMap Template
 =============================================================================
 ConfigMap containing nginx config for Reporting UI application
 Requirements: 8.1, 8.2, 8.3, 8.4, 8.6
 =============================================================================
 */}}
{{- if .Values.reporting.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fineract-ui-stack.fullname" . }}-reporting-nginx
  labels:
    {{- include "fineract-ui-stack.appLabels" (dict "root" . "appName" "reporting") | nindent 4 }}
data:
  default.conf: |
{{ .Files.Get "files/frontend-default.conf" | indent 4 }}
{{- end }}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use kube-dns for dynamic upstream resolution
    resolver KUBE_DNS_RESOLVER valid=30s ipv6=off;

    # Static assets - long cache (1 year)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # JSON files - no cache
    location ~* \.json$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Strip Vite base path prefix (/asset-manager/)
    rewrite ^/asset-manager/(.*) /$1 last;

    # Rewrite build-time URLs to same-origin so requests stay inside the gateway.
    sub_filter 'http://localhost:8083' '';
    sub_filter 'https://localhost/fineract-provider/api' '/fineract-provider/api';
    # Keep Asset Manager API calls on the gateway subpath. This also catches
    # the asset-service URL after localhost stripping.
    sub_filter '/api/v1' '/asset-manager/api/v1';
    sub_filter_once off;
    sub_filter_types application/javascript;

    # Userinfo endpoint - returns OAuth2-Proxy headers as JSON
    location = /api/userinfo {
        default_type application/json;
        return 200 '{"user":"$http_x_auth_request_user","email":"$http_x_auth_request_email","roles":"$http_x_auth_request_groups"}';
    }

    # Metrics stub for nginx-prometheus-exporter sidecar
    location /stub_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }

    # SPA fallback - React Router support
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}

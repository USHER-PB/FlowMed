{{- if .Values.userStorage.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-storage-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: user-storage
    {{- include "azamra-edge.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      address: "0.0.0.0"
      port: {{ .Values.userStorage.port }}
      tls:
        enabled: false
        port: 3443
        cert_path: "./config/tls/api.crt"
        key_path: "./config/tls/api.key"

    logging:
      level: "debug"
      log_requests_enabled: true

    database:
      url: ${DATABASE_URL}
      pool_size: {{ .Values.userStorage.database.poolSize }}

    runtime:
      mode: shared

    redis:
      url: ${REDIS_URL}

    storage:
      type: minio
      minio:
        endpoint: ${MINIO_ENDPOINT}
        region: ${MINIO_REGION}
        access_key: ${MINIO_ACCESS_KEY}
        secret_key: ${MINIO_SECRET_KEY}
        bucket: ${MINIO_BUCKET}
        force_path_style: true
        presign_ttl_seconds: 900

    oauth2:
      issuer: {{ .Values.userStorage.oauth2.issuer | default (printf "%s/realms/%s" .Values.global.keycloakUrl .Values.global.realm) | quote }}
      jwks-uri: {{ .Values.userStorage.oauth2.jwkSetUri | default (printf "%s/realms/%s/protocol/openid-connect/certs" .Values.global.keycloakUrl .Values.global.realm) | quote }}
      base-paths: []

    kc:
      enabled: {{ .Values.userStorage.kc.enabled }}
      base-path: {{ .Values.userStorage.kc.basePath | quote }}
      signature_secret: {{ .Values.userStorage.kc.signatureSecret | quote }}
      max_clock_skew_seconds: {{ .Values.userStorage.kc.maxClockSkewSeconds }}
      max_body_bytes: {{ .Values.userStorage.kc.maxBodyBytes }}

    bff:
      enabled: {{ .Values.userStorage.bff.enabled }}
      base-path: {{ .Values.userStorage.bff.basePath | quote }}

    staff:
      enabled: {{ .Values.userStorage.staff.enabled }}
      base-path: {{ .Values.userStorage.staff.basePath | quote }}

    cuss:
      api_url: {{ .Values.userStorage.cuss.apiUrl | quote }}

    sms:
      provider: {{ .Values.userStorage.sms.provider | quote }}
      {{- if .Values.userStorage.sms.apiBaseUrl }}
      api:
        base_url: {{ .Values.userStorage.sms.apiBaseUrl | quote }}
      {{- end }}
{{- end }}

{{- if .Values.networkPolicies.enabled }}
# NOTE: Base policies (default-deny-*, allow-dns, allow-egress-same-namespace,
# allow-egress-to-monitoring) are defined in fineract-infra chart only.
---
# Allow traffic to user-storage from azamra-bff and keycloak
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-user-storage
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "azamra-edge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: user-storage
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: azamra-bff
        - podSelector:
            matchLabels:
              app: azamra-kyc-manager
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: keycloak
      ports:
        - protocol: TCP
          port: {{ .Values.userStorage.port }}
---
# Allow user-storage to reach postgres, redis, and external HTTPS endpoints
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-user-storage-external
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "azamra-edge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: user-storage
  policyTypes:
    - Egress
  egress:
    # DNS resolution (required for service discovery)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL access
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: data-store-postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: infra-cache
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # External HTTPS endpoints (e.g. Keycloak OIDC discovery / JWKS)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
---
# Allow traffic to azamra-bff from ingress-nginx controller (direct ingress)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-azamra-bff
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "azamra-edge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: azamra-bff
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.azamraBff.port }}
---
# Allow azamra-bff to reach user-storage, redis, and external HTTPS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-azamra-bff-external
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "azamra-edge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: azamra-bff
  policyTypes:
    - Egress
  egress:
    # DNS resolution (required for service discovery)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # User-storage access
    - to:
        - podSelector:
            matchLabels:
              app: user-storage
      ports:
        - protocol: TCP
          port: 3000
    # Redis access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: infra-cache
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # External HTTPS (Keycloak OIDC, etc.)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
{{- if .Values.azamraKycManager.enabled }}
---
# Allow traffic to azamra-kyc-manager from ingress-nginx controller only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-azamra-kyc-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "azamra-edge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: azamra-kyc-manager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.azamraKycManager.port }}
---
# Allow KYC manager to reach user-storage, redis, and external HTTPS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-azamra-kyc-manager-external
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "azamra-edge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: azamra-kyc-manager
  policyTypes:
    - Egress
  egress:
    # DNS resolution (required for service discovery)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # User-storage access
    - to:
        - podSelector:
            matchLabels:
              app: user-storage
      ports:
        - protocol: TCP
          port: 3000
    # Redis access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: infra-cache
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # External HTTPS (Keycloak OIDC discovery, public issuer)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
{{- end }}

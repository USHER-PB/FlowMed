# =============================================================================
# Ingress NGINX Helm Chart - Default Values
# =============================================================================
# Standardized NGINX Ingress Controller configuration.
# =============================================================================

# =============================================================================
# Ingress NGINX Controller Configuration
# =============================================================================
ingress-nginx:
  # Enable the ingress-nginx controller
  enabled: true
  
  # Deployment mode:
  # - "standalone": Single Nginx instance (local/dev)
  # - "ha": High Availability mode (Production)
  mode: standalone

  controller:
    # Managed by the mode toggle below
    replicaCount: 1
    
    # Image configuration
    image:
      registry: registry.k8s.io
      image: ingress-nginx/controller
      tag: v1.9.4
      pullPolicy: IfNotPresent
    
    # Resource allocation
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    
    # Autoscaling configuration
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
    
    # Service configuration
    service:
      type: LoadBalancer
      annotations: {}
    
    # Metrics configuration
    metrics:
      enabled: false
      serviceMonitor:
        enabled: false
    
    # ConfigMap data
    config:
      use-forwarded-headers: "true"
      compute-full-forwarded-for: "true"
      use-proxy-protocol: "false"
      log-format-upstream: '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $request_length $request_time [$proxy_upstream_name] [$proxy_alternative_upstream_name] $upstream_addr $upstream_response_length $upstream_response_time $upstream_status $req_id'

    # Pod Security Configuration
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
        add:
          - NET_BIND_SERVICE
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 101
      runAsGroup: 82

    # Mount necessary writable directories as emptyDir
    extraVolumeMounts:
      - name: tmp
        mountPath: /tmp
      - name: client-body
        mountPath: /var/lib/nginx/body
      - name: proxy-temp
        mountPath: /var/lib/nginx/proxy
      - name: fastcgi-temp
        mountPath: /var/lib/nginx/fastcgi
      - name: scgi-temp
        mountPath: /var/lib/nginx/scgi
      - name: uwsgi-temp
        mountPath: /var/lib/nginx/uwsgi

    extraVolumes:
      - name: tmp
        emptyDir: {}
      - name: client-body
        emptyDir: {}
      - name: proxy-temp
        emptyDir: {}
      - name: fastcgi-temp
        emptyDir: {}
      - name: scgi-temp
        emptyDir: {}
      - name: uwsgi-temp
        emptyDir: {}

# =============================================================================
# Common Labels and Annotations
# =============================================================================
commonLabels: {}
commonAnnotations: {}

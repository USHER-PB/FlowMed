apiVersion: v2
name: ingress-nginx
description: |
  Ingress NGINX Controller local wrapper chart.
  Deploys the NGINX Ingress Controller for traffic routing.
type: application
version: 1.0.0
appVersion: "4.9.0"

maintainers:
  - name: OM Platform Team
    email: platform@example.com

keywords:
  - ingress
  - nginx
  - networking
  - controller

home: https://github.com/kubernetes/ingress-nginx
sources:
  - https://github.com/kubernetes/ingress-nginx

annotations:
  category: Networking
  licenses: Apache-2.0

dependencies:
  - name: ingress-nginx
    version: "4.9.0"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx.enabled

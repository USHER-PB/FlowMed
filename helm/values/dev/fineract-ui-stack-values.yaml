# =============================================================================
# Fineract UI Stack Helm Chart - Local Development Values
# =============================================================================
# This values file is configured for local deployment with:
# - No TLS (disabled for local development)
# - fineract.local domain for ingress
# - Connection to existing fineract-core services in the same namespace
# =============================================================================

# =============================================================================
# Global Configuration
# =============================================================================

global:
  domain: fineract.local
  apiEndpoint: http://api.fineract.local
  keycloak:
    url: http://auth.fineract.local
    realm: fineract
  # Docker registry credentials for ghcr.io
  imagePullSecrets:
    - name: ghcr-credentials

# =============================================================================
# Common UI Configuration
# =============================================================================

ui:
  image:
    repository: nginx
    tag: "1.25-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  replicaCount: 1

# =============================================================================
# Portal Application
# =============================================================================

portal:
  enabled: true
  replicaCount: 1
  image:
    repository: nginx
    tag: "1.28.2-alpine"
    pullPolicy: IfNotPresent
  hostname: portal.fineract.local
  keycloak:
    clientId: fineract-portal
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  ingress:
    enabled: true
    clusterIssuer: ""
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
  tls:
    enabled: false
    secretName: ""

# =============================================================================
# Web App Application (Disabled by default)
# =============================================================================

webApp:
  enabled: false
  image:
    repository: fineract/web-app-ui
    tag: "1.0.0"
  hostname: app.fineract.local
  keycloak:

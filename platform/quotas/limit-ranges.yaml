# =============================================================================
# LimitRange Templates
# =============================================================================
# Default resource limits and requests for pods in team namespaces.
# Ensures pods have reasonable defaults and maximum limits.
# =============================================================================

# -----------------------------------------------------------------------------
# Standard LimitRange (Default for all teams)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  labels:
    app.kubernetes.io/part-of: om-platform
spec:
  limits:
    # Container defaults and limits
    - type: Container
      # Default requests if not specified
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      # Default limits if not specified
      default:
        cpu: 500m
        memory: 512Mi
      # Minimum allowed
      min:
        cpu: 10m
        memory: 16Mi
      # Maximum allowed per container
      max:
        cpu: 4
        memory: 8Gi
      # Max ratio of limit/request
      maxLimitRequestRatio:
        cpu: "10"
        memory: "4"

    # Pod-level limits
    - type: Pod
      max:
        cpu: 8
        memory: 16Gi

    # PVC limits
    - type: PersistentVolumeClaim
      min:
        storage: 1Gi
      max:
        storage: 100Gi

---
# -----------------------------------------------------------------------------
# Strict LimitRange (For cost-sensitive teams)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: LimitRange
metadata:
  name: strict-limits
  labels:
    app.kubernetes.io/part-of: om-platform
    limit-profile: strict
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 200m
        memory: 256Mi
      min:
        cpu: 10m
        memory: 16Mi
      max:
        cpu: 1
        memory: 2Gi
      maxLimitRequestRatio:
        cpu: "4"
        memory: "2"

    - type: Pod
      max:
        cpu: 2
        memory: 4Gi

    - type: PersistentVolumeClaim
      min:
        storage: 1Gi
      max:
        storage: 20Gi

---
# -----------------------------------------------------------------------------
# Relaxed LimitRange (For data/ML workloads)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: LimitRange
metadata:
  name: relaxed-limits
  labels:
    app.kubernetes.io/part-of: om-platform
    limit-profile: relaxed
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 500m
        memory: 1Gi
      default:
        cpu: 2
        memory: 4Gi
      min:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: 16
        memory: 64Gi
      maxLimitRequestRatio:
        cpu: "10"
        memory: "8"

    - type: Pod
      max:
        cpu: 32
        memory: 128Gi

    - type: PersistentVolumeClaim
      min:
        storage: 10Gi
      max:
        storage: 500Gi

# =============================================================================
# Backstage Application Configuration
# =============================================================================
# Configuration for the self-service developer portal.
# =============================================================================

app:
  title: OM Platform Portal
  baseUrl: https://portal.example.com

organization:
  name: Your Organization

backend:
  baseUrl: https://portal.example.com
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: https://portal.example.com
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: backstage

  cache:
    store: redis
    connection: redis://${REDIS_HOST}:6379

# =============================================================================
# Authentication
# =============================================================================
auth:
  environment: production
  providers:
    oidc:
      production:
        metadataUrl: ${OIDC_METADATA_URL}
        clientId: ${OIDC_CLIENT_ID}
        clientSecret: ${OIDC_CLIENT_SECRET}
        prompt: auto
        scope: 'openid profile email groups'
        signIn:
          resolvers:
            - resolver: emailMatchingUserEntityProfileEmail

# =============================================================================
# Integrations
# =============================================================================
integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

# =============================================================================
# Catalog
# =============================================================================
catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Group, User, Template]
  locations:
    # Platform catalog
    - type: url
      target: https://github.com/skyengpro/om/blob/main/catalog/all.yaml
      rules:
        - allow: [Component, System, API, Resource, Template, Group]

    # Team catalogs (auto-discovered)
    - type: github-discovery
      target: https://github.com/skyengpro/*/blob/main/catalog-info.yaml

# =============================================================================
# Scaffolder (Templates)
# =============================================================================
scaffolder:
  defaultAuthor:
    name: Backstage
    email: backstage@example.com
  defaultCommitMessage: "Initial commit from Backstage template"

# =============================================================================
# Kubernetes
# =============================================================================
kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - url: ${KUBERNETES_API_URL}
          name: production
          authProvider: serviceAccount
          serviceAccountToken: ${KUBERNETES_SA_TOKEN}
          caData: ${KUBERNETES_CA_DATA}
          customResources:
            - group: 'platform.om.io'
              apiVersion: 'v1alpha1'
              plural: 'tenants'
            - group: 'platform.om.io'
              apiVersion: 'v1alpha1'
              plural: 'servicerequests'
            - group: 'argoproj.io'
              apiVersion: 'v1alpha1'
              plural: 'applications'

# =============================================================================
# ArgoCD
# =============================================================================
argocd:
  baseUrl: https://argocd.example.com
  username: ${ARGOCD_USERNAME}
  password: ${ARGOCD_PASSWORD}
  appLocatorMethods:
    - type: config
      instances:
        - name: production
          url: https://argocd.example.com
          username: ${ARGOCD_USERNAME}
          password: ${ARGOCD_PASSWORD}

# =============================================================================
# Prometheus
# =============================================================================
prometheus:
  proxyPath: /prometheus/api

# =============================================================================
# Grafana
# =============================================================================
grafana:
  domain: https://grafana.example.com
  unifiedAlerting: true

# =============================================================================
# TechDocs
# =============================================================================
techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'awsS3'
    awsS3:
      bucketName: ${TECHDOCS_BUCKET}
      region: ${AWS_REGION}

# =============================================================================
# Search
# =============================================================================
search:
  pg:
    highlightOptions:
      useHighlight: true
      maxWord: 35
      minWord: 15

# =============================================================================
# Permission (RBAC)
# =============================================================================
permission:
  enabled: true

# =============================================================================
# Request Platform Service Template
# =============================================================================
# Scaffolder template for requesting managed services from the catalog.
# =============================================================================

apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: request-service
  title: Request Platform Service
  description: |
    Request a managed service from the platform catalog:
    - PostgreSQL Database
    - Redis Cache
    - RabbitMQ Message Queue
    - And more...
  tags:
    - service
    - database
    - cache
    - infrastructure
spec:
  owner: group:platform-team
  type: resource

  # ==========================================================================
  # Input Parameters
  # ==========================================================================
  parameters:
    - title: Service Selection
      required:
        - serviceName
        - serviceType
        - size
      properties:
        serviceName:
          title: Service Name
          type: string
          description: Name for this service instance
          pattern: '^[a-z][a-z0-9-]{2,30}$'
          ui:autofocus: true

        serviceType:
          title: Service Type
          type: string
          description: Type of service to provision
          enum:
            - postgresql
            - redis
            - rabbitmq
            - mongodb
            - elasticsearch
          enumNames:
            - PostgreSQL (Relational Database)
            - Redis (Cache/Store)
            - RabbitMQ (Message Queue)
            - MongoDB (Document Database)
            - Elasticsearch (Search Engine)

        size:
          title: Size
          type: string
          description: Resource allocation tier
          enum:
            - small
            - medium
            - large
          enumNames:
            - Small (Dev/Test - $20-50/mo)
            - Medium (Staging/Low-traffic Prod - $100-200/mo)
            - Large (High-traffic Production - $400-800/mo)
          default: small

    - title: Configuration
      properties:
        environment:
          title: Environment
          type: string
          description: Target environment
          enum:
            - dev
            - staging
            - prod
          default: dev

        version:
          title: Version
          type: string
          description: Service version (leave empty for latest)

        customConfig:
          title: Custom Configuration
          type: object
          description: Additional configuration options
          properties:
            storage:
              title: Storage Size
              type: string
              description: Override default storage (e.g., 50Gi)
            highAvailability:
              title: High Availability
              type: boolean
              description: Enable HA mode (requires medium+ size)
              default: false

    - title: Ownership
      required:
        - owner
      properties:
        owner:
          title: Owner Team
          type: string
          description: Team that will own this service
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group

        application:
          title: Application (Optional)
          type: string
          description: Application this service is for
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - Component

  # ==========================================================================
  # Execution Steps
  # ==========================================================================
  steps:
    # Step 1: Validate team has quota
    - id: validate-quota
      name: Validate Team Quota
      action: http:backstage:request
      input:
        method: GET
        path: /api/platform/tenants/${{ parameters.owner | replace('group:', '') }}/quota

    # Step 2: Create ServiceRequest
    - id: create-service-request
      name: Create Service Request
      action: http:backstage:request
      input:
        method: POST
        path: /api/kubernetes/apply
        body:
          apiVersion: platform.om.io/v1alpha1
          kind: ServiceRequest
          metadata:
            name: ${{ parameters.serviceName }}
            namespace: ${{ parameters.owner | replace('group:', '') }}-${{ parameters.environment }}
            labels:
              platform.om.io/tenant: ${{ parameters.owner | replace('group:', '') }}
              platform.om.io/service-type: ${{ parameters.serviceType }}
              platform.om.io/environment: ${{ parameters.environment }}
            annotations:
              backstage.io/created-by: ${{ user.entity.metadata.name }}
              platform.om.io/application: ${{ parameters.application }}
          spec:
            service: ${{ parameters.serviceType }}
            size: ${{ parameters.size }}
            config:
              version: ${{ parameters.version }}
              storage: ${{ parameters.customConfig.storage }}
              highAvailability: ${{ parameters.customConfig.highAvailability }}

    # Step 3: Wait for provisioning (for dev, auto-approved)
    - id: wait-provisioning
      name: Wait for Provisioning
      if: ${{ parameters.environment === 'dev' }}
      action: debug:wait
      input:
        seconds: 5

    # Step 4: Register in catalog
    - id: register-resource
      name: Register in Catalog
      action: catalog:register
      input:
        catalogInfoPath: |
          apiVersion: backstage.io/v1alpha1
          kind: Resource
          metadata:
            name: ${{ parameters.serviceName }}
            description: ${{ parameters.serviceType }} instance for ${{ parameters.owner }}
            annotations:
              platform.om.io/service-request: ${{ parameters.owner | replace('group:', '') }}-${{ parameters.environment }}/${{ parameters.serviceName }}
            links:
              - url: /catalog/default/component/${{ parameters.application }}
                title: Application
                icon: catalog
          spec:
            type: ${{ parameters.serviceType }}
            owner: ${{ parameters.owner }}
            system: ${{ parameters.application }}
            dependencyOf:
              - component:${{ parameters.application }}

  # ==========================================================================
  # Output
  # ==========================================================================
  output:
    links:
      - title: View Service Request
        url: /catalog/default/resource/${{ parameters.serviceName }}
        icon: catalog
      - title: View in Kubernetes
        url: /kubernetes/ns/${{ parameters.owner | replace('group:', '') }}-${{ parameters.environment }}/servicerequests/${{ parameters.serviceName }}
        icon: kubernetes
    text:
      - title: Service Provisioning
        content: |
          ## Service Request Created

          **Service**: ${{ parameters.serviceType }}
          **Name**: ${{ parameters.serviceName }}
          **Size**: ${{ parameters.size }}
          **Environment**: ${{ parameters.environment }}

          ${{ parameters.environment === 'prod' ? '⚠️ Production services require approval. You will be notified when approved.' : '✅ Development services are auto-approved and will be ready shortly.' }}

          ### Connection Details

          Once provisioned, connection details will be available in:
          - Secret: `${{ parameters.serviceName }}-credentials`
          - Namespace: `${{ parameters.owner | replace('group:', '') }}-${{ parameters.environment }}`

          ### Next Steps

          1. Wait for the service to be provisioned (check status in catalog)
          2. Configure your application to use the connection secret
          3. Test connectivity from your application

# =============================================================================
# New Application Template
# =============================================================================
# Scaffolder template for creating new applications on the OM Platform.
# =============================================================================

apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-application
  title: Create New Application
  description: |
    Bootstrap a new application with:
    - GitHub repository with CI/CD
    - Helm deployment configuration
    - ArgoCD application
    - Monitoring and alerting
  tags:
    - recommended
    - application
    - kubernetes
spec:
  owner: group:platform-team
  type: service

  # ==========================================================================
  # Input Parameters
  # ==========================================================================
  parameters:
    # Step 1: Basic Information
    - title: Application Information
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Application Name
          type: string
          description: Unique name for your application (lowercase, alphanumeric)
          pattern: '^[a-z][a-z0-9-]{2,30}$'
          ui:autofocus: true
          ui:help: 'Must start with letter, only lowercase letters, numbers, and hyphens'

        description:
          title: Description
          type: string
          description: Brief description of what this application does

        owner:
          title: Owner Team
          type: string
          description: Team that owns this application
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group

    # Step 2: Technical Configuration
    - title: Technical Configuration
      required:
        - language
      properties:
        language:
          title: Programming Language
          type: string
          description: Primary programming language
          enum:
            - go
            - python
            - nodejs
            - java
          enumNames:
            - Go
            - Python
            - Node.js
            - Java
          default: go

        framework:
          title: Framework
          type: string
          description: Application framework (optional)
          enum:
            - none
            - gin
            - echo
            - fastapi
            - flask
            - express
            - nestjs
            - spring-boot
          default: none

        database:
          title: Database
          type: string
          description: Database requirement
          enum:
            - none
            - postgresql
            - mongodb
          enumNames:
            - None
            - PostgreSQL
            - MongoDB
          default: none

        cache:
          title: Cache
          type: string
          description: Cache requirement
          enum:
            - none
            - redis
          enumNames:
            - None
            - Redis
          default: none

    # Step 3: Deployment Configuration
    - title: Deployment Configuration
      properties:
        environments:
          title: Environments
          type: array
          description: Environments to deploy to
          items:
            type: string
            enum:
              - dev
              - staging
              - prod
          uniqueItems: true
          default:
            - dev

        replicas:
          title: Initial Replicas
          type: integer
          description: Number of replicas per environment
          minimum: 1
          maximum: 10
          default: 2

        port:
          title: Application Port
          type: integer
          description: Port your application listens on
          default: 8080

        healthPath:
          title: Health Check Path
          type: string
          description: HTTP path for health checks
          default: /health

    # Step 4: Repository
    - title: Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - skyengpro

  # ==========================================================================
  # Execution Steps
  # ==========================================================================
  steps:
    # Step 1: Fetch application template
    - id: fetch-app-template
      name: Fetch Application Template
      action: fetch:template
      input:
        url: ./skeleton/${{ parameters.language }}
        targetPath: ./repo
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          framework: ${{ parameters.framework }}
          port: ${{ parameters.port }}
          healthPath: ${{ parameters.healthPath }}

    # Step 2: Generate Helm values
    - id: fetch-helm-values
      name: Generate Helm Values
      action: fetch:template
      input:
        url: ./skeleton/deployment
        targetPath: ./deployment
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          environments: ${{ parameters.environments }}
          replicas: ${{ parameters.replicas }}
          port: ${{ parameters.port }}
          healthPath: ${{ parameters.healthPath }}
          database: ${{ parameters.database }}
          cache: ${{ parameters.cache }}

    # Step 3: Create GitHub repository
    - id: publish-github
      name: Create GitHub Repository
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: internal
        sourcePath: ./repo
        protectDefaultBranch: true
        requireCodeOwnerReviews: true

    # Step 4: Create deployment PR in platform repo
    - id: create-deployment-pr
      name: Create Deployment Configuration
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=skyengpro&repo=om
        branchName: onboard-${{ parameters.name }}
        title: 'feat: onboard ${{ parameters.name }} application'
        description: |
          ## New Application Onboarding

          This PR adds deployment configuration for **${{ parameters.name }}**.

          - **Team**: ${{ parameters.owner }}
          - **Environments**: ${{ parameters.environments | join(', ') }}
          - **Database**: ${{ parameters.database }}
          - **Cache**: ${{ parameters.cache }}

          Auto-generated by Backstage.
        sourcePath: ./deployment
        targetPath: apps/${{ parameters.owner | replace('group:', '') }}/${{ parameters.name }}

    # Step 5: Create service requests for dependencies
    - id: create-database
      name: Request Database
      if: ${{ parameters.database !== 'none' }}
      action: http:backstage:request
      input:
        method: POST
        path: /api/kubernetes/apply
        body:
          apiVersion: platform.om.io/v1alpha1
          kind: ServiceRequest
          metadata:
            name: ${{ parameters.name }}-db
            namespace: ${{ parameters.owner | replace('group:', '') }}-dev
          spec:
            service: ${{ parameters.database }}
            size: small

    - id: create-cache
      name: Request Cache
      if: ${{ parameters.cache !== 'none' }}
      action: http:backstage:request
      input:
        method: POST
        path: /api/kubernetes/apply
        body:
          apiVersion: platform.om.io/v1alpha1
          kind: ServiceRequest
          metadata:
            name: ${{ parameters.name }}-cache
            namespace: ${{ parameters.owner | replace('group:', '') }}-dev
          spec:
            service: ${{ parameters.cache }}
            size: small

    # Step 6: Register in catalog
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  # ==========================================================================
  # Output
  # ==========================================================================
  output:
    links:
      - title: Open Repository
        url: ${{ steps['publish-github'].output.remoteUrl }}
        icon: github
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
      - title: Deployment PR
        url: ${{ steps['create-deployment-pr'].output.remoteUrl }}
        icon: github
    text:
      - title: Next Steps
        content: |
          ## Your application has been created!

          1. **Review the deployment PR**: ${{ steps['create-deployment-pr'].output.remoteUrl }}
          2. **Set up secrets**: Add any required secrets to your namespace
          3. **Push your first commit**: The CI/CD pipeline will build and deploy automatically
          4. **Monitor deployment**: View in ArgoCD once the PR is merged

          Need help? Check the [Getting Started Guide](/docs/default/component/getting-started)

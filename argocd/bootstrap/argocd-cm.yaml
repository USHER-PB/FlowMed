# =============================================================================
# ArgoCD ConfigMap
# =============================================================================
# Core configuration for ArgoCD server.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Repository configuration
  repositories: |
    - type: git
      url: https://github.com/skyengpro/om.git
      name: om-platform

  # Resource tracking
  resource.tracking.method: annotation

  # Status badge
  statusbadge.enabled: "true"

  # Application controller settings
  timeout.reconciliation: "180s"

  # Kustomize build options
  kustomize.buildOptions: "--enable-helm"

  # Health checks for custom resources
  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.health ~= nil then
        hs.status = obj.status.health.status
        if obj.status.health.message ~= nil then
          hs.message = obj.status.health.message
        end
      end
    end
    return hs

  # Ignore differences for certain resources
  resource.customizations.ignoreDifferences.all: |
    managedFieldsManagers:
      - kube-controller-manager
      - argo-rollouts

  # URL configuration (update with your domain)
  url: https://argocd.example.com

# =============================================================================
# ArgoCD Bootstrap - Kustomization
# =============================================================================
# This kustomization bootstraps ArgoCD and deploys the app-of-apps pattern.
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - argocd-cm.yaml
  - argocd-rbac-cm.yaml
  - app-of-apps.yaml
  - projects.yaml

# =============================================================================
# Security Scanning Pipeline
# =============================================================================
# This workflow runs security scans on infrastructure code and dependencies.
# =============================================================================

name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run weekly on Sundays
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # =============================================================================
  # Terraform Security Scan
  # =============================================================================
  tfsec:
    name: Terraform Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true

      - name: Run tfsec with SARIF
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          working_directory: terraform
          sarif_file: tfsec.sarif
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tfsec.sarif
        continue-on-error: true  # Skip if Advanced Security not available

  # =============================================================================
  # Trivy Vulnerability Scan
  # =============================================================================
  trivy:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy IaC Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'  # Don't fail on findings

      - name: Run Trivy for SARIF
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true  # Skip if Advanced Security not available

  # =============================================================================
  # Checkov Security Scan
  # =============================================================================
  checkov:
    name: Checkov IaC Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,kubernetes,helm
          soft_fail: true
          output_format: cli
          skip_check: CKV_SECRET_6  # Skip false positives on example files

  # =============================================================================
  # Secret Detection
  # =============================================================================
  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # =============================================================================
  # Helm Chart Security
  # =============================================================================
  helm-security:
    name: Helm Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Template Helm Charts
        run: |
          mkdir -p /tmp/manifests
          for chart in helm/charts/*/; do
            if [ -f "${chart}Chart.yaml" ]; then
              name=$(basename "$chart")
              echo "Templating $name..."
              helm template test "$chart" > "/tmp/manifests/${name}.yaml" 2>/dev/null || true
            fi
          done

      - name: Install Kubescape
        run: curl -s https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | /bin/bash

      - name: Run Kubescape
        run: |
          if [ -n "$(ls -A /tmp/manifests/ 2>/dev/null)" ]; then
            kubescape scan /tmp/manifests/ --format pretty-printer || true
          else
            echo "No manifests to scan"
          fi

  # =============================================================================
  # OPA Policy Validation
  # =============================================================================
  opa:
    name: OPA Policy Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Validate OPA Policies
        run: |
          if [ -d "security/opa-policies" ]; then
            echo "Checking OPA policies..."
            find security/opa-policies -name "*.rego" -exec opa check {} \;
          else
            echo "No OPA policies found"
          fi

  # =============================================================================
  # Summary
  # =============================================================================
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [tfsec, trivy, checkov, secrets, helm-security, opa]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform (tfsec) | ${{ needs.tfsec.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy IaC | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov | ${{ needs.checkov.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Security | ${{ needs.helm-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OPA Policies | ${{ needs.opa.result }} |" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# Security Scanning Pipeline
# =============================================================================
# This workflow runs security scans on infrastructure code and dependencies.
# Works with GitHub Free accounts.
# =============================================================================

name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run weekly on Sundays
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # =============================================================================
  # Terraform Security Scan
  # =============================================================================
  tfsec:
    name: Terraform Security
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true

  # =============================================================================
  # Trivy Vulnerability Scan
  # =============================================================================
  trivy:
    name: Trivy IaC Scan
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy IaC Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

  # =============================================================================
  # Checkov Security Scan
  # =============================================================================
  checkov:
    name: Checkov IaC Analysis
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,kubernetes,helm
          soft_fail: true
          output_format: cli

  # =============================================================================
  # Secret Detection
  # =============================================================================
  secrets:
    name: Secret Detection
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.1/gitleaks_8.18.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.1_linux_x64.tar.gz
          chmod +x gitleaks

      - name: Run Gitleaks
        run: |
          ./gitleaks detect --source . --verbose --no-git || true

  # =============================================================================
  # Helm Chart Security
  # =============================================================================
  helm-security:
    name: Helm Security
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Lint and Validate Charts
        run: |
          for chart in helm/charts/*/; do
            if [ -f "${chart}Chart.yaml" ]; then
              name=$(basename "$chart")
              echo "=== Checking $name ==="
              helm lint "$chart" --strict || true
              helm template test "$chart" > /dev/null 2>&1 && echo "Template OK" || echo "Template issues found"
            fi
          done

  # =============================================================================
  # OPA Policy Validation
  # =============================================================================
  opa:
    name: OPA Policy Check
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Validate OPA Policies
        run: |
          if [ -d "security/opa-policies" ]; then
            echo "Checking OPA policies..."
            find security/opa-policies -name "*.rego" -exec opa check {} \; || true
          else
            echo "No OPA policies found"
          fi

  # =============================================================================
  # Summary
  # =============================================================================
  summary:
    name: Security Summary
    runs-on: self-hosted
    needs: [tfsec, trivy, checkov, secrets, helm-security, opa]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform (tfsec) | ${{ needs.tfsec.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy IaC | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov | ${{ needs.checkov.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Security | ${{ needs.helm-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OPA Policies | ${{ needs.opa.result }} |" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# Terraform CI/CD Pipeline
# =============================================================================
# This workflow validates and plans Terraform configurations.
# Works with GitHub Free accounts.
# =============================================================================

name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

env:
  TF_VERSION: "1.6.6"

permissions:
  contents: read
  pull-requests: write

jobs:
  # =============================================================================
  # Validate Terraform Code
  # =============================================================================
  validate:
    name: Validate
    runs-on: arc-runner-set

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Validate Modules
        run: |
          for dir in terraform/modules/*/; do
            echo "Validating $dir..."
            cd "$dir"
            terraform init -backend=false
            terraform validate
            cd - > /dev/null
          done

  # =============================================================================
  # Security Scan with tfsec
  # =============================================================================
  security:
    name: Security Scan
    runs-on: arc-runner-set
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true

  # =============================================================================
  # Terraform Plan (Validation Only - No AWS Required)
  # =============================================================================
  plan-validate:
    name: Plan Validation
    runs-on: arc-runner-set
    needs: [validate, security]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check AWS Configuration
        id: aws-check
        run: |
          if [ -n "${{ secrets.AWS_ROLE_ARN }}" ] || [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::notice::AWS credentials not configured. Running validation only."
          fi

      - name: Terraform Init (Validation Mode)
        run: |
          for env in dev staging prod; do
            if [ -d "terraform/environments/$env" ]; then
              echo "Initializing $env environment..."
              cd "terraform/environments/$env"
              terraform init -backend=false
              cd - > /dev/null
            fi
          done

      - name: Terraform Validate All Environments
        run: |
          for env in dev staging prod; do
            if [ -d "terraform/environments/$env" ]; then
              echo "=== Validating $env ==="
              cd "terraform/environments/$env"
              terraform validate
              cd - > /dev/null
            fi
          done

      - name: Summary
        run: |
          echo "## Terraform Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Format check, security scan, and validation completed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.aws-check.outputs.configured }}" != "true" ]; then
            echo "**Note:** AWS credentials not configured. To enable full plan/apply:" >> $GITHUB_STEP_SUMMARY
            echo "- Set \`AWS_ROLE_ARN\` secret for OIDC authentication, OR" >> $GITHUB_STEP_SUMMARY
            echo "- Set \`AWS_ACCESS_KEY_ID\` and \`AWS_SECRET_ACCESS_KEY\` secrets" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # Terraform Plan (With AWS - Optional)
  # =============================================================================
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: arc-runner-set
    needs: [validate, security]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && vars.ENABLE_AWS_PLAN == 'true')

    strategy:
      matrix:
        environment: [dev]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS Configuration
        id: aws-check
        run: |
          if [ -n "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "method=oidc" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "method=keys" >> $GITHUB_OUTPUT
          else
            echo "method=none" >> $GITHUB_OUTPUT
            echo "::error::AWS credentials not configured"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials (OIDC)
        if: steps.aws-check.outputs.method == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Configure AWS Credentials (Keys)
        if: steps.aws-check.outputs.method == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: terraform/environments/${{ matrix.environment }}/tfplan
          retention-days: 7

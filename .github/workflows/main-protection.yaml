# =============================================================================
# Main Branch Protection (Soft Enforcement)
# =============================================================================
# This workflow provides soft protection for the main branch by:
# - Detecting direct pushes (not from PR merges)
# - Sending notifications for direct pushes
# - Creating audit trail
#
# Note: This cannot prevent pushes, only detect and alert.
# For full protection, upgrade to GitHub Pro or make repo public.
# =============================================================================

name: Main Branch Protection

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  # =============================================================================
  # Detect Direct Push
  # =============================================================================
  detect-direct-push:
    name: Detect Direct Push
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Check if PR Merge
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          # Check if this is a merge commit from a PR
          if echo "$COMMIT_MSG" | grep -qE "^Merge pull request #[0-9]+"; then
            echo "type=pr-merge" >> $GITHUB_OUTPUT
            echo "This is a PR merge commit"
          elif echo "$COMMIT_MSG" | grep -qE "\(#[0-9]+\)"; then
            echo "type=squash-merge" >> $GITHUB_OUTPUT
            echo "This is a squash merge commit"
          else
            echo "type=direct-push" >> $GITHUB_OUTPUT
            echo "::warning::Direct push to main detected!"
          fi

      - name: Log Direct Push
        if: steps.check.outputs.type == 'direct-push'
        run: |
          echo "## Direct Push Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | ${{ github.event.head_commit.author.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | ${{ github.event.head_commit.timestamp }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recommendation:** Please use Pull Requests for all changes to main." >> $GITHUB_STEP_SUMMARY

      - name: Log PR Merge
        if: steps.check.outputs.type == 'pr-merge' || steps.check.outputs.type == 'squash-merge'
        run: |
          echo "## PR Merge Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit \`${{ github.sha }}\` is from a Pull Request merge." >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Commit Signing Check
  # =============================================================================
  check-signature:
    name: Check Commit Signature
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Check GPG Signature
        uses: actions/github-script@v7
        with:
          script: |
            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });

            const verified = commit.data.commit.verification.verified;
            const reason = commit.data.commit.verification.reason;

            if (verified) {
              core.info('Commit is signed and verified');
              await core.summary
                .addHeading('Commit Signature', 2)
                .addRaw(`Commit \`${context.sha}\` is **signed and verified**.`)
                .write();
            } else {
              core.warning('Commit is not signed or verification failed');
              await core.summary
                .addHeading('Commit Signature', 2)
                .addRaw(`Commit \`${context.sha}\` is **not signed** or verification failed.`)
                .addBreak()
                .addRaw(`Reason: ${reason}`)
                .addBreak()
                .addLink('Learn about commit signing', 'https://docs.github.com/en/authentication/managing-commit-signature-verification')
                .write();
            }

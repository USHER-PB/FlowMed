# =============================================================================
# Main Branch Protection (Soft Enforcement)
# =============================================================================
# This workflow provides soft protection for the main branch by:
# - Detecting direct pushes (not from PR merges)
# - Sending notifications for direct pushes
# - Creating audit trail
#
# Note: This cannot prevent pushes, only detect and alert.
# For full protection, upgrade to GitHub Pro or make repo public.
# =============================================================================

name: Main Branch Protection

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  # =============================================================================
  # Detect Direct Push
  # =============================================================================
  detect-direct-push:
    name: Detect Direct Push
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Check if PR Merge
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          # Check if this is a merge commit from a PR
          if echo "$COMMIT_MSG" | grep -qE "^Merge pull request #[0-9]+"; then
            echo "type=pr-merge" >> $GITHUB_OUTPUT
            echo "This is a PR merge commit"
          elif echo "$COMMIT_MSG" | grep -qE "^\(#[0-9]+\)$"; then
            echo "type=squash-merge" >> $GITHUB_OUTPUT
            echo "This is a squash merge commit"
          else
            # Check if any PR was merged with this commit
            PR_NUMBER=$(gh pr list --state merged --json number,mergeCommit --jq ".[] | select(.mergeCommit.oid == \"$COMMIT_SHA\") | .number" 2>/dev/null || echo "")

            if [ -n "$PR_NUMBER" ]; then
              echo "type=pr-merge" >> $GITHUB_OUTPUT
              echo "This commit is from PR #$PR_NUMBER"
            else
              echo "type=direct-push" >> $GITHUB_OUTPUT
              echo "::warning::Direct push to main detected!"
            fi
          fi

      - name: Log Direct Push
        if: steps.check.outputs.type == 'direct-push'
        run: |
          echo "## Direct Push Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | ${{ github.event.head_commit.author.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | ${{ github.event.head_commit.timestamp }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recommendation:** Please use Pull Requests for all changes to main." >> $GITHUB_STEP_SUMMARY

      - name: Create Issue for Direct Push
        if: steps.check.outputs.type == 'direct-push' && vars.CREATE_ISSUE_ON_DIRECT_PUSH == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Direct push to main: ${context.sha.substring(0, 7)}`;
            const body = `## Direct Push Detected

            A direct push to the main branch was detected.

            | Field | Value |
            |-------|-------|
            | **Commit** | ${context.sha} |
            | **Author** | ${{ github.event.head_commit.author.name }} |
            | **Message** | ${{ github.event.head_commit.message }} |
            | **Timestamp** | ${{ github.event.head_commit.timestamp }} |

            ### Recommendation
            Please use Pull Requests for all changes to main. This ensures:
            - Code review
            - CI checks pass
            - Change history is clear

            ---
            *This issue was automatically created by the branch protection workflow.*
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['direct-push', 'needs-review']
            });

  # =============================================================================
  # Commit Signing Check
  # =============================================================================
  check-signature:
    name: Check Commit Signature
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Check GPG Signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="${{ github.sha }}"

          # Get commit verification status
          VERIFIED=$(gh api repos/${{ github.repository }}/commits/$COMMIT_SHA --jq '.commit.verification.verified')

          if [ "$VERIFIED" == "true" ]; then
            echo "Commit is signed and verified"
            echo "## Commit Signature" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Commit \`$COMMIT_SHA\` is signed and verified." >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::Commit is not signed or verification failed"
            echo "## Commit Signature" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Commit \`$COMMIT_SHA\` is **not signed** or verification failed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Consider enabling commit signing: https://docs.github.com/en/authentication/managing-commit-signature-verification" >> $GITHUB_STEP_SUMMARY
          fi

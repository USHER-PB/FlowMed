# =============================================================================
# Release Workflow
# =============================================================================
# Automates releases with changelog generation using Release Please.
# Follows Conventional Commits for version bumping and changelog entries.
# =============================================================================

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - auto
          - major
          - minor
          - patch
        default: auto

permissions:
  contents: write
  pull-requests: write

jobs:
  # ===========================================================================
  # Release Please - Automated Release Management
  # ===========================================================================
  release-please:
    name: Release Please
    runs-on: arc-runner-set
    if: ${{ github.event_name == 'push' || github.event.inputs.release_type == 'auto' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
      pr: ${{ steps.release.outputs.pr }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Summary
        run: |
          echo "## Release Please Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.release.outputs.release_created }}" == "true" ]; then
            echo "Release created: **${{ steps.release.outputs.tag_name }}**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.release.outputs.pr }}" != "" ]; then
            echo "Release PR created/updated: #${{ steps.release.outputs.pr }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "No release action needed" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # Post-Release Actions
  # ===========================================================================
  post-release:
    name: Post-Release Actions
    runs-on: arc-runner-set
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Generate Release Notes Summary
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          TAG="${{ needs.release-please.outputs.tag_name }}"

          echo "## Release ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Release Page](https://github.com/${{ github.repository }}/releases/tag/${TAG})" >> $GITHUB_STEP_SUMMARY
          echo "- [Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        if: ${{ vars.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "New OM Platform Release: ${{ needs.release-please.outputs.tag_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "OM Platform Release ${{ needs.release-please.outputs.version }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\n${{ needs.release-please.outputs.version }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Tag:*\n${{ needs.release-please.outputs.tag_name }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Release"
                      },
                      "url": "https://github.com/${{ github.repository }}/releases/tag/${{ needs.release-please.outputs.tag_name }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ===========================================================================
  # Manual Release
  # ===========================================================================
  manual-release:
    name: Manual Release
    runs-on: arc-runner-set
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'auto' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          # Read version from manifest
          CURRENT=$(cat .release-please-manifest.json | jq -r '."."')
          echo "version=${CURRENT}" >> $GITHUB_OUTPUT
          echo "Current version: ${CURRENT}"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"

          # Parse version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case $RELEASE_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "New version: ${NEW_VERSION}"

      - name: Update manifest
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          echo '{".":'\"${NEW_VERSION}\"'}' > .release-please-manifest.json
          cat .release-please-manifest.json

      - name: Update CHANGELOG
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          # Update Unreleased section to new version
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [${NEW_VERSION}] - ${DATE}/" CHANGELOG.md

          # Update links at bottom
          REPO="https://github.com/${{ github.repository }}"
          echo "" >> CHANGELOG.md
          echo "[${NEW_VERSION}]: ${REPO}/releases/tag/v${NEW_VERSION}" >> CHANGELOG.md

      - name: Commit changes
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          git add .release-please-manifest.json CHANGELOG.md
          git commit -m "chore(release): v${NEW_VERSION}"

      - name: Create tag
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"

      - name: Push changes
        run: |
          git push origin main --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"

          # Extract changelog section for this version
          awk '/^## \['"${NEW_VERSION}"'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md > release_notes.md

          # Create release
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes-file release_notes.md

      - name: Summary
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          echo "## Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${NEW_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/v${NEW_VERSION})" >> $GITHUB_STEP_SUMMARY

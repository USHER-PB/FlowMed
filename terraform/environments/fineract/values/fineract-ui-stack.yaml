accountManagement:
  enabled: true
  hostname: accounts.fineract.local
  image:
    pullPolicy: Always
    repository: ghcr.io/adorsys-gis/fineract-apps/account-manager-app
    tag: cac454a9
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    clusterIssuer: ""
    enabled: true
  keycloak:
    clientId: fineract-account-management
  replicaCount: 1
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 32Mi
  tls:
    enabled: false
    secretName: ""

